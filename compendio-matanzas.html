 se sublevan e izan por primera vez en Gran Bretaña la bandera roja como símbolo obrero; las tropas disparan contra la multitud ante el Castle Inn y matan a ~16–24 personas. Richard Lewis (\"Dic Penderyn\") es ahorcado con pruebas endebles y queda como mártir de la clase obrera galesa.", "investigaciones": "Gwyn A. Williams, The Merthyr Rising (Croom Helm, 1978).", "profundizar": "Williams, The Merthyr Rising (1978).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 94, "titulo": "Levantamiento de Newport (cartismo)", "sala": "V. Siglo XIX", "subsala": "Bloque 7 — Otros focos (fuera de los seis ejes anteriores)", "fecha": "4 de noviembre de 1839", "lugar": "Newport (Gales)", "resumen": "Miles de cartistas, en su mayoría mineros, marchan sobre Newport para exigir el sufragio y liberar a presos del movimiento; las tropas abren fuego desde el hotel Westgate y matan a ~22 manifestantes. Sus líderes (John Frost y otros) son condenados a muerte por alta traición, pena conmutada por deportación. Última gran insurrección armada de la Gran Bretaña continental.", "investigaciones": "David J. V. Jones, The Last Rising: The Newport Insurrection of 1839 (Oxford University Press, 1985).", "profundizar": "Dorothy Thompson, The Chartists: Popular Politics in the Industrial Revolution (Temple Smith, 1984).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 95, "titulo": "Comuna de París (Semana Sangrienta)", "sala": "V. Siglo XIX", "subsala": "Bloque 7 — Otros focos (fuera de los seis ejes anteriores)", "fecha": "21–28 de mayo de 1871", "lugar": "París", "resumen": "El ejército de Versalles reconquista París y aplasta la Comuna con ejecuciones masivas de communards. Las cifras tradicionales (~17.000–20.000) han sido revisadas por Robert Tombs a ~6.000–7.500 a partir de los registros de exhumación, una estimación discutida. Represión emblemática de un gobierno revolucionario popular.", "investigaciones": "Robert Tombs, \"How bloody was la semaine sanglante of 1871? A revision\", The Historical Journal 55 (2012); del mismo autor, The Paris Commune 1871 (Longman, 1999).", "profundizar": "John Merriman, Massacre: The Life and Death of the Paris Commune (Basic Books, 2014).", "arte": "las fotografías de communards muertos en sus ataúdes", "arteDesc": "las fotografías de communards muertos en sus ataúdes (Disdéri, 1871); Édouard Manet, litografía La guerra civil (1871).", "tipo": null}, {"id": 96, "titulo": "Sendero de Lágrimas (deportación cherokee)", "sala": "V. Siglo XIX", "subsala": "Bloque 7 — Otros focos (fuera de los seis ejes anteriores)", "fecha": "1838–1839", "lugar": "del sureste de EE. UU. al Territorio Indio (Oklahoma)", "resumen": "En aplicación de la Ley de Remoción India (1830), ~16.000 cheroquis son deportados por la fuerza hacia el oeste; ~4.000 o más mueren de hambre, frío y enfermedad en el camino. Limpieza étnica de pueblos indígenas por el Estado estadounidense.", "investigaciones": "los registros federales de la remoción.", "profundizar": "Theda Perdue & Michael D. Green, The Cherokee Nation and the Trail of Tears (Viking, 2007).", "arte": "Robert Lindneux, The Trail of Tears", "arteDesc": "Robert Lindneux, The Trail of Tears (1942), representación posterior y romantizada.", "tipo": null}, {"id": 97, "titulo": "Masacre de Sand Creek", "sala": "V. Siglo XIX", "subsala": "Bloque 7 — Otros focos (fuera de los seis ejes anteriores)", "fecha": "29 de noviembre de 1864", "lugar": "Sand Creek, Colorado (EE. UU.)", "resumen": "La caballería de Colorado del coronel Chivington ataca un campamento cheyene y arapajó que ondeaba bandera estadounidense, bajo el jefe Olla Negra; ~150–230 personas, en su mayoría mujeres, niños y ancianos, son masacradas y mutiladas.", "investigaciones": "las actas de la investigación del Congreso de 1865.", "profundizar": "Ari Kelman, A Misplaced Massacre: Struggling over the Memory of Sand Creek (Harvard University Press, 2013).", "arte": "los dibujos en libro de contabilidad", "arteDesc": "los dibujos en libro de contabilidad (\"ledger art\") del cheyene Howling Wolf, testigo del ataque.", "tipo": null}, {"id": 98, "titulo": "Masacre de Wounded Knee", "sala": "V. Siglo XIX", "subsala": "Bloque 7 — Otros focos (fuera de los seis ejes anteriores)", "fecha": "29 de diciembre de 1890", "lugar": "arroyo Wounded Knee, Dakota del Sur (EE. UU.)", "resumen": "El 7.º de Caballería estadounidense mata a ~250–300 lakotas, en su mayoría mujeres y niños, al intentar desarmar un campamento ligado a la Danza de los Espíritus. Suele marcar el fin de las guerras indias.", "investigaciones": "los informes militares y los testimonios lakotas recogidos poco después.", "profundizar": "Jeffrey Ostler, The Plains Sioux and U.S. Colonialism from Lewis and Clark to Wounded Knee (Cambridge University Press, 2004); Dee Brown, Bury My Heart at Wounded Knee (Holt, Rinehart & Winston, 1970).", "arte": "las fotografías contemporáneas de los muertos congelados y de…", "arteDesc": "las fotografías contemporáneas de los muertos congelados y de la fosa común.", "tipo": null}, {"id": 99, "titulo": "Atrocidades del Estado Libre del Congo", "sala": "V. Siglo XIX", "subsala": "Bloque 7 — Otros focos (fuera de los seis ejes anteriores)", "fecha": "años 1890–1908", "lugar": "Estado Libre del Congo (actual R. D. del Congo)", "resumen": "Bajo la propiedad personal del rey Leopoldo II de Bélgica, el régimen del caucho impone trabajo forzado, toma de rehenes y mutilaciones (manos cortadas), con un colapso demográfico estimado en millones de muertos (la cifra exacta se debate). Atrocidad colonial paradigmática.", "investigaciones": "el informe de Roger Casement (1904) y la campaña de E. D. Morel como fuentes contemporáneas.", "profundizar": "Adam Hochschild, King Leopold's Ghost (Houghton Mifflin, 1998).", "arte": "las fotografías de congoleses mutilados tomadas por la…", "arteDesc": "las fotografías de congoleses mutilados tomadas por la misionera Alice Seeley Harris (c. 1904), iconos de la campaña humanitaria.", "tipo": null}, {"id": 100, "titulo": "Genocidio del Putumayo (auge del caucho)", "sala": "VI. Siglo XX", "subsala": "Bloque 1 — Ligado al colonialismo y neocolonialismo", "fecha": "c. 1900–1912", "lugar": "cuenca del Putumayo (Perú y Colombia)", "resumen": "La Peruvian Amazon Company de Julio César Arana (la \"Casa Arana\"), registrada en Londres, esclaviza a los pueblos indígenas (huitoto, bora, andoque, ocaina) para extraer caucho mediante tortura, mutilación, hambre y ejecuciones; se estima en ~30.000 los indígenas muertos en poco más de una década. La denuncia del cónsul británico Roger Casement (1912) provocó un escándalo internacional. Atrocidad del capitalismo extractivo sobre poblaciones sin Estado.", "investigaciones": "el Putumayo Report de Roger Casement (1912) y The Putumayo: The Devil's Paradise de W. E. Hardenburg (1912), denuncias contemporáneas.", "profundizar": "Jordan Goodman, The Devil and Mr Casement: One Man's Battle for Human Rights in South America's Heart of Darkness (Verso, 2009); Michael Taussig, Shamanism, Colonialism, and the Wild Man (University of Chicago Press, 1987).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 101, "titulo": "Genocidio de los herero y los nama", "sala": "VI. Siglo XX", "subsala": "Bloque 1 — Ligado al colonialismo y neocolonialismo", "fecha": "1904–1908", "lugar": "África del Sudoeste Alemana (actual Namibia)", "resumen": "Tras la rebelión herero, el general Lothar von Trotha emite una orden de exterminio (Vernichtungsbefehl): los supervivientes son empujados al desierto del Omaheke e internados en campos de concentración (Shark Island). Mueren ~40.000–80.000 herero (~80% del pueblo) y ~10.000 nama. Primer genocidio del siglo XX.", "investigaciones": "los informes militares alemanes y los testimonios recogidos en el Informe Blue Book británico (1918).", "profundizar": "David Olusoga & Casper W. Erichsen, The Kaiser's Holocaust: Germany's Forgotten Genocide and the Colonial Roots of Nazism (Faber, 2010).", "arte": "fotografías contemporáneas del genocidio y de los campos", "arteDesc": "fotografías contemporáneas del genocidio y de los campos.", "tipo": null}, {"id": 102, "titulo": "\"Pacificación\" de Cirenaica (Libia)", "sala": "VI. Siglo XX", "subsala": "Bloque 1 — Ligado al colonialismo y neocolonialismo", "fecha": "1929–1934", "lugar": "Cirenaica (Libia italiana)", "resumen": "Para sofocar la resistencia de Omar al-Mujtar, el régimen fascista italiano (Graziani) deporta a la población a campos de concentración en el desierto, donde muere ~la mitad de los habitantes de Cirenaica (decenas de miles). Al-Mujtar es ahorcado en 1931.", "investigaciones": "los archivos coloniales italianos y los trabajos de Angelo Del Boca y Giorgio Rochat.", "profundizar": "Ali Abdullatif Ahmida, Genocide in Libya: Shar, a Hidden Colonial History (Routledge, 2020).", "arte": "fotografías de los campos y de la ejecución de al-Mujtar", "arteDesc": "fotografías de los campos y de la ejecución de al-Mujtar.", "tipo": null}, {"id": 103, "titulo": "Masacre de Adís Abeba (Yekatit 12)", "sala": "VI. Siglo XX", "subsala": "Bloque 1 — Ligado al colonialismo y neocolonialismo", "fecha": "febrero de 1937", "lugar": "Adís Abeba (Etiopía ocupada por Italia)", "resumen": "Tras un atentado contra el virrey Graziani, las fuerzas italianas y los colonos masacran a la población de Adís Abeba durante tres días; las estimaciones etíopes hablan de ~30.000 muertos (las italianas, de cifras mucho menores). Represalia colonial contra la población civil.", "investigaciones": "los testimonios etíopes y los documentos italianos.", "profundizar": "Ian Campbell, The Addis Ababa Massacre: Italy's National Shame (Hurst, 2017).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 104, "titulo": "Masacres de Sétif y Guelma", "sala": "VI. Siglo XX", "subsala": "Bloque 1 — Ligado al colonialismo y neocolonialismo", "fecha": "8 de mayo de 1945", "lugar": "Sétif y Guelma (Argelia francesa)", "resumen": "El mismo día de la victoria aliada, manifestaciones nacionalistas argelinas son reprimidas con extrema violencia por el ejército y las milicias colonas; las cifras van de ~1.500–2.000 (estimación francesa) a ~45.000 (reivindicación argelina). Detonante de la guerra de independencia.", "investigaciones": "los archivos militares franceses y los trabajos de Jean-Pierre Peyroulou.", "profundizar": "Jean-Louis Planche, Sétif 1945: Histoire d'un massacre annoncé (Perrin, 2006).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 105, "titulo": "Mau Mau y la masacre de Hola (Kenia)", "sala": "VI. Siglo XX", "subsala": "Bloque 1 — Ligado al colonialismo y neocolonialismo", "fecha": "1952–1960 (masacre de Hola, 1959)", "lugar": "Kenia británica", "resumen": "La contrainsurgencia británica contra la rebelión Mau Mau interna a ~150.000 kikuyus en campos de detención con tortura sistemática; en Hola, 11 detenidos son golpeados hasta la muerte. Decenas de miles de muertos en la represión colonial.", "investigaciones": "los archivos coloniales británicos (en parte destruidos u ocultados, \"migrated archives\").", "profundizar": "Caroline Elkins, Imperial Reckoning: The Untold Story of Britain's Gulag in Kenya (Holt, 2005); David Anderson, Histories of the Hanged (Norton, 2005).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 106, "titulo": "Masacre de Sharpeville", "sala": "VI. Siglo XX", "subsala": "Bloque 1 — Ligado al colonialismo y neocolonialismo", "fecha": "21 de marzo de 1960", "lugar": "Sharpeville (Sudáfrica)", "resumen": "La policía del apartheid dispara contra una manifestación pacífica contra las leyes de pases; 69 muertos (muchos por la espalda) y ~180 heridos. Radicalizó la lucha antiapartheid y desató la condena internacional.", "investigaciones": "las actas de la comisión de investigación y, después, la Comisión de la Verdad y la Reconciliación.", "profundizar": "Tom Lodge, Sharpeville: An Apartheid Massacre and Its Consequences (Oxford University Press, 2011).", "arte": "las fotografías de prensa de la matanza", "arteDesc": "las fotografías de prensa de la matanza.", "tipo": null}, {"id": 107, "titulo": "Masacre de Wiriyamu", "sala": "VI. Siglo XX", "subsala": "Bloque 1 — Ligado al colonialismo y neocolonialismo", "fecha": "diciembre de 1972", "lugar": "Wiriyamu, provincia de Tete (Mozambique portugués)", "resumen": "Tropas portuguesas masacran a ~150–400 aldeanos durante la guerra colonial contra el FRELIMO; el caso, revelado por un misionero, deslegitimó al Estado Novo.", "investigaciones": "la denuncia del padre Adrian Hastings y la prensa británica (1973).", "profundizar": "Mustafah Dhada, The Portuguese Massacre of Wiriyamu in Colonial Mozambique, 1964–2013 (Bloomsbury, 2016).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 108, "titulo": "Masacre de la Liga Bodo (Corea del Sur)", "sala": "VI. Siglo XX", "subsala": "Bloque 2 — Ligado a la Guerra Fría", "fecha": "1950", "lugar": "Corea del Sur", "resumen": "Al estallar la Guerra de Corea, el gobierno surcoreano ejecuta sumariamente a ~100.000–200.000 personas sospechosas de simpatías izquierdistas (la \"Liga Bodo\"); el hecho fue ocultado durante décadas. (En paralelo, la masacre de No Gun Ri, perpetrada por tropas estadounidenses contra refugiados, julio de 1950.)", "investigaciones": "la Comisión de la Verdad y la Reconciliación de Corea del Sur (2005–2010).", "profundizar": "Bruce Cumings, The Korean War: A History (Modern Library, 2010).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 109, "titulo": "Matanzas anticomunistas de Indonesia", "sala": "VI. Siglo XX", "subsala": "Bloque 2 — Ligado a la Guerra Fría", "fecha": "1965–1966", "lugar": "Indonesia", "resumen": "Tras un supuesto golpe, el ejército (bajo Suharto) y milicias civiles ejecutan a ~500.000 personas acusadas de comunistas, y detienen a más de un millón; EE. UU. y el Reino Unido apoyaron la purga. Una de las mayores matanzas de la Guerra Fría.", "investigaciones": "Geoffrey B. Robinson, The Killing Season: A History of the Indonesian Massacres, 1965-66 (Princeton University Press, 2018).", "profundizar": "Robert Cribb (ed.), The Indonesian Killings 1965–1966 (Monash, 1990).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 110, "titulo": "Atrocidades de la guerra soviético-afgana", "sala": "VI. Siglo XX", "subsala": "Bloque 2 — Ligado a la Guerra Fría", "fecha": "1979–1989", "lugar": "Afganistán", "resumen": "La ocupación soviética y la guerra contrainsurgente provocan ~1 millón o más de muertos civiles afganos, con masacres de aldeas (Kerala, 1979), bombardeos de zonas rurales y siembra masiva de minas. Devastación de la población campesina.", "investigaciones": "los informes de derechos humanos de la época y los archivos soviéticos posteriores.", "profundizar": "M. Hassan Kakar, Afghanistan: The Soviet Invasion and the Afghan Response, 1979–1982 (University of California Press, 1995).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 111, "titulo": "Represión de la Revolución húngara", "sala": "VI. Siglo XX", "subsala": "Bloque 2 — Ligado a la Guerra Fría", "fecha": "1956", "lugar": "Hungría", "resumen": "La intervención militar soviética aplasta la Revolución húngara: ~2.500–3.000 húngaros muertos y ~200.000 exiliados. Represión de un levantamiento popular en el bloque soviético.", "investigaciones": "las actas de la ONU y los archivos soviéticos desclasificados.", "profundizar": "Charles Gati, Failed Illusions: Moscow, Washington, Budapest, and the 1956 Hungarian Revolt (Stanford University Press, 2006).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 112, "titulo": "Masacre de El Mozote", "sala": "VI. Siglo XX", "subsala": "Bloque 2 — Ligado a la Guerra Fría", "fecha": "diciembre de 1981", "lugar": "El Mozote, Morazán (El Salvador)", "resumen": "El batallón Atlacatl, entrenado por EE. UU., masacra a ~800–1.000 campesinos —en su mayoría mujeres, niños y ancianos— durante la guerra civil salvadoreña. Una de las peores atrocidades de la Guerra Fría en América Latina.", "investigaciones": "el reportaje de Mark Danner, las exhumaciones del Equipo Argentino de Antropología Forense y la Comisión de la Verdad de la ONU (1993).", "profundizar": "Mark Danner, The Massacre at El Mozote (Vintage, 1994).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 113, "titulo": "Genocidio armenio", "sala": "VI. Siglo XX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas", "fecha": "1915–1917", "lugar": "Imperio otomano (Anatolia, Siria)", "resumen": "El gobierno de los Jóvenes Turcos (Talat Pasha) deporta y extermina a la población armenia mediante marchas de la muerte y matanzas; ~1–1,5 millones de muertos. Genocidio paradigmático del nacionalismo del siglo XX (negado por el Estado turco).", "investigaciones": "Taner Akçam, A Shameful Act: The Armenian Genocide and the Question of Turkish Responsibility (Metropolitan, 2006).", "profundizar": "Raymond Kévorkian, The Armenian Genocide: A Complete History (I. B. Tauris, 2011).", "arte": "las fotografías de Armin T", "arteDesc": "las fotografías de Armin T. Wegner (1915–1916); la obra de Arshile Gorky, superviviente, The Artist and His Mother (c. 1926–1936).", "tipo": null}, {"id": 114, "titulo": "El Holocausto (Shoá)", "sala": "VI. Siglo XX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas", "fecha": "1941–1945", "lugar": "Europa ocupada por la Alemania nazi", "resumen": "El régimen nazi asesina sistemáticamente a ~6 millones de judíos europeos —junto a millones de otras víctimas— mediante guetos, fusilamientos masivos (Einsatzgruppen) y campos de exterminio. La culminación del exterminio de Estado por ideología racial-nacionalista.", "investigaciones": "Raul Hilberg, The Destruction of the European Jews (Quadrangle, 1961).", "profundizar": "Saul Friedländer, Nazi Germany and the Jews (2 vols., HarperCollins, 1997–2007).", "arte": "el arte clandestino de los campos y guetos", "arteDesc": "el arte clandestino de los campos y guetos; la obra de Felix Nussbaum (asesinado en Auschwitz); las fotografías de la liberación.", "tipo": null}, {"id": 115, "titulo": "El Porajmos (genocidio del pueblo gitano)", "sala": "VI. Siglo XX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas", "fecha": "1939–1945", "lugar": "Europa ocupada por la Alemania nazi", "resumen": "El régimen nazi y sus aliados asesinan a ~250.000–500.000 personas romaníes (sinti y roma) por motivos raciales, en fusilamientos y campos de exterminio. Genocidio largamente olvidado.", "investigaciones": "los archivos nazis y los testimonios de supervivientes.", "profundizar": "Donald Kenrick & Grattan Puxon, The Destiny of Europe's Gypsies (Sussex University Press, 1972); Guenter Lewy, The Nazi Persecution of the Gypsies (Oxford University Press, 2000).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 116, "titulo": "Genocidio de Ruanda", "sala": "VI. Siglo XX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas", "fecha": "abril–julio de 1994", "lugar": "Ruanda", "resumen": "En unos 100 días, milicias hutus (Interahamwe) y el Estado asesinan a ~500.000–800.000 tutsis y hutus moderados, en gran parte a machetazos, mientras la comunidad internacional se inhibe. Genocidio de raíz étnico-nacionalista.", "investigaciones": "Alison Des Forges / Human Rights Watch, Leave None to Tell the Story: Genocide in Rwanda (1999).", "profundizar": "Philip Gourevitch, We Wish to Inform You That Tomorrow We Will Be Killed with Our Families (Farrar, Straus and Giroux, 1998).", "arte": "Alfredo Jaar, The Rwanda Project", "arteDesc": "Alfredo Jaar, The Rwanda Project (1994–2000); las fotografías de las iglesias-memorial (Nyamata, Ntarama).", "tipo": null}, {"id": 117, "titulo": "Genocidio de Srebrenica", "sala": "VI. Siglo XX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas", "fecha": "julio de 1995", "lugar": "Srebrenica (Bosnia y Herzegovina)", "resumen": "Las fuerzas serbobosnias de Ratko Mladić ejecutan a ~8.000 hombres y niños bosníacos en una \"zona segura\" de la ONU. Calificado como genocidio por el TPIY y la CIJ; punto culminante de la limpieza étnica en las guerras yugoslavas.", "investigaciones": "las sentencias del Tribunal Penal Internacional para la ex-Yugoslavia (TPIY).", "profundizar": "David Rohde, Endgame: The Betrayal and Fall of Srebrenica (Farrar, Straus and Giroux, 1997).", "arte": "las fotografías de las fosas comunes y del memorial de Potočari", "arteDesc": "las fotografías de las fosas comunes y del memorial de Potočari.", "tipo": null}, {"id": 118, "titulo": "Gran incendio de Esmirna", "sala": "VI. Siglo XX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas", "fecha": "septiembre de 1922", "lugar": "Esmirna / İzmir (Anatolia)", "resumen": "Al final de la guerra greco-turca, las tropas turcas toman Esmirna; el incendio y las matanzas destruyen los barrios griegos y armenios, con miles de muertos (cifras muy discutidas) y cientos de miles de refugiados. Episodio culminante de la \"Gran Catástrofe\" griega.", "investigaciones": "los relatos de testigos y los archivos diplomáticos de la época.", "profundizar": "Giles Milton, Paradise Lost: Smyrna 1922 (Sceptre, 2008).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 119, "titulo": "Bombardeo de Guernica y represión franquista", "sala": "VI. Siglo XX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas", "fecha": "1936–1939 (bombardeo de Guernica, 26 de abril de 1937)", "lugar": "España", "resumen": "Durante la Guerra Civil, la Legión Cóndor bombardea a la población civil de Guernica, y el bando sublevado ejecuta masivamente a sus opositores (el \"terror blanco\", ~100.000 o más muertos). Violencia de Estado y fascista contra la población.", "investigaciones": "las exhumaciones de fosas comunes y el trabajo de la memoria histórica.", "profundizar": "Paul Preston, The Spanish Holocaust: Inquisition and Extermination in Twentieth-Century Spain (HarperPress, 2012).", "arte": "Pablo Picasso, Guernica", "arteDesc": "Pablo Picasso, Guernica (1937, Museo Reina Sofía), la obra antibélica más célebre del siglo XX.", "tipo": null}, {"id": 120, "titulo": "Ejecuciones de militantes vascos bajo el franquismo", "sala": "VI. Siglo XX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas", "fecha": "1968–1975", "lugar": "España (dictadura franquista)", "resumen": "La dictadura de Franco reprime con dureza al independentismo vasco armado: el primer militante de ETA muere a manos de la policía en 1968; el Proceso de Burgos (1970) dicta penas de muerte luego conmutadas por la presión internacional; y en septiembre de 1975 son fusilados dos miembros de ETA y tres del FRAP, las últimas ejecuciones del régimen, semanas antes de la muerte de Franco. (El conflicto armado posterior entre ETA y el Estado español, ya en la España democrática y en otro contexto histórico, excede el alcance de este compendio.)", "investigaciones": "las actas del Proceso de Burgos (1970) y la documentación de la represión tardofranquista.", "profundizar": "Stanley G. Payne, The Franco Regime, 1936–1975 (University of Wisconsin Press, 1987).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 121, "titulo": "Campaña de Anfal contra los kurdos", "sala": "VI. Siglo XX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas", "fecha": "1988 (ataque químico de Halabja, marzo de 1988)", "lugar": "Kurdistán iraquí", "resumen": "El régimen de Saddam Husein extermina a la población kurda en la campaña de Anfal: ~50.000–182.000 muertos, aldeas arrasadas y deportaciones; en Halabja, un ataque con armas químicas mata a ~3.200–5.000 personas en un solo día. Calificada de genocidio.", "investigaciones": "Human Rights Watch, Genocide in Iraq: The Anfal Campaign (1993), y los archivos baazistas capturados.", "profundizar": "Joost Hiltermann, A Poisonous Affair: America, Iraq, and the Gassing of Halabja (Cambridge University Press, 2007).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 122, "titulo": "Masacre de Nankín", "sala": "VI. Siglo XX", "subsala": "Bloque 4 — China, Indochina y el sudeste asiático", "fecha": "diciembre de 1937 – enero de 1938", "lugar": "Nankín (China)", "resumen": "Tras tomar la capital china, el ejército imperial japonés masacra a ~200.000–300.000 personas (cifra disputada y negada por sectores nacionalistas japoneses) y comete violaciones masivas. Atrocidad emblemática de la guerra sino-japonesa.", "investigaciones": "los registros del Comité Internacional de la Zona de Seguridad de Nankín; el Tribunal de Tokio.", "profundizar": "Iris Chang, The Rape of Nanking (Basic Books, 1997).", "arte": "las fotografías contemporáneas tomadas por testigos…", "arteDesc": "las fotografías contemporáneas tomadas por testigos occidentales y japoneses.", "tipo": null}, {"id": 123, "titulo": "Gran Salto Adelante (hambruna)", "sala": "VI. Siglo XX", "subsala": "Bloque 4 — China, Indochina y el sudeste asiático", "fecha": "1959–1961", "lugar": "China", "resumen": "Las políticas de colectivización forzada y producción de Mao provocan la mayor hambruna de la historia: estimaciones de ~15 a 45 millones de muertos. Catástrofe inducida por el Estado sobre el campesinado.", "investigaciones": "Yang Jisheng, Tombstone: The Great Chinese Famine, 1958–1962 (Yang Jisheng, ed. inglesa Farrar, Straus and Giroux, 2012), basado en archivos provinciales.", "profundizar": "Frank Dikötter, Mao's Great Famine (Bloomsbury, 2010).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 124, "titulo": "Masacres de la Revolución Cultural", "sala": "VI. Siglo XX", "subsala": "Bloque 4 — China, Indochina y el sudeste asiático", "fecha": "1966–1976", "lugar": "China", "resumen": "La Revolución Cultural desata oleadas de violencia política con masacres documentadas: la de Daoxian (1967, ~9.000 muertos), las de Guangxi (con casos de canibalismo político) y el \"Agosto Rojo\" de Pekín. Persecución y muerte de \"enemigos de clase\".", "investigaciones": "Song Yongyi y la investigación documental sobre las masacres provinciales.", "profundizar": "Frank Dikötter, The Cultural Revolution: A People's History, 1962–1976 (Bloomsbury, 2016).", "arte": "las fotografías de Li Zhensheng", "arteDesc": "las fotografías de Li Zhensheng (Red-Color News Soldier).", "tipo": null}, {"id": 125, "titulo": "Masacre de My Lai", "sala": "VI. Siglo XX", "subsala": "Bloque 4 — China, Indochina y el sudeste asiático", "fecha": "16 de marzo de 1968", "lugar": "My Lai, provincia de Quảng Ngãi (Vietnam del Sur)", "resumen": "Soldados estadounidenses (compañía Charlie, teniente Calley) masacran a ~347–504 civiles vietnamitas desarmados, en su mayoría mujeres, niños y ancianos. Símbolo de las atrocidades de la guerra de Vietnam.", "investigaciones": "el reportaje de Seymour Hersh y el Informe Peers del Ejército estadounidense.", "profundizar": "Howard Jones, My Lai: Vietnam, 1968, and the Descent into Darkness (Oxford University Press, 2017).", "arte": "las fotografías de Ronald Haeberle", "arteDesc": "las fotografías de Ronald Haeberle (usadas en el cartel And babies, 1969).", "tipo": null}, {"id": 126, "titulo": "Genocidio camboyano (Jemeres Rojos)", "sala": "VI. Siglo XX", "subsala": "Bloque 4 — China, Indochina y el sudeste asiático", "fecha": "1975–1979", "lugar": "Camboya (Kampuchea Democrática)", "resumen": "El régimen de Pol Pot vacía las ciudades e impone trabajo forzado, hambre y ejecuciones masivas: ~1,7–2,2 millones de muertos, cerca de una cuarta parte de la población. Exterminio de \"enemigos de clase\" y minorías.", "investigaciones": "los archivos de S-21 (Tuol Sleng) y el tribunal ECCC.", "profundizar": "Ben Kiernan, The Pol Pot Regime: Race, Power, and Genocide in Cambodia under the Khmer Rouge, 1975–79 (Yale University Press, 1996).", "arte": "las pinturas de Vann Nath, superviviente de la prisión S-21", "arteDesc": "las pinturas de Vann Nath, superviviente de la prisión S-21; los retratos de identificación de Tuol Sleng.", "tipo": null}, {"id": 127, "titulo": "Masacre de Sook Ching", "sala": "VI. Siglo XX", "subsala": "Bloque 4 — China, Indochina y el sudeste asiático", "fecha": "febrero–marzo de 1942", "lugar": "Singapur y Malaya", "resumen": "Tras ocupar Singapur, el ejército japonés ejecuta sistemáticamente a la población china considerada hostil; las cifras van de ~5.000 (cifra japonesa) a ~50.000 o más (estimaciones chinas). Exterminio selectivo de una comunidad bajo la ocupación.", "investigaciones": "los testimonios reunidos en los juicios de posguerra.", "profundizar": "Hayashi Hirofumi y la historiografía sobre la ocupación japonesa del sudeste asiático.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 128, "titulo": "Ocupación de Timor Oriental (masacre de Santa Cruz)", "sala": "VI. Siglo XX", "subsala": "Bloque 4 — China, Indochina y el sudeste asiático", "fecha": "1975–1999 (masacre de Santa Cruz, 12 de noviembre de 1991)", "lugar": "Timor Oriental", "resumen": "La ocupación indonesia causa ~100.000–200.000 muertos (CAVR: ~90.800–202.600), cerca de un cuarto de la población, por la violencia y el hambre. La matanza de ~250 manifestantes en el cementerio de Santa Cruz, filmada por un periodista, dio visibilidad mundial al caso.", "investigaciones": "la Comisión de Acogida, Verdad y Reconciliación (CAVR), informe Chega! (2005).", "profundizar": "Geoffrey Robinson, \"If You Leave Us Here, We Will Die\": How Genocide Was Stopped in East Timor (Princeton University Press, 2010).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 129, "titulo": "Masacre de Amritsar (Jallianwala Bagh)", "sala": "VI. Siglo XX", "subsala": "Bloque 5 — Subcontinente indio", "fecha": "13 de abril de 1919", "lugar": "Amritsar, Panyab (India británica)", "resumen": "Las tropas británicas del general Dyer disparan sin aviso contra una multitud pacífica encerrada en un recinto; ~379 muertos (cifra oficial) hasta ~1.000 o más. Punto de inflexión del nacionalismo indio.", "investigaciones": "las actas de la Comisión Hunter (1920).", "profundizar": "Kim A. Wagner, Amritsar 1919: An Empire of Fear and the Making of a Massacre (Yale University Press, 2019).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 130, "titulo": "Hambruna de Bengala de 1943", "sala": "VI. Siglo XX", "subsala": "Bloque 5 — Subcontinente indio", "fecha": "1943", "lugar": "Bengala (India británica)", "resumen": "Una hambruna agravada por las decisiones del gobierno colonial británico durante la guerra (requisas, exportaciones, denegación de ayuda) mata a ~2,1–3 millones de personas. Catástrofe inducida sobre la población.", "investigaciones": "Amartya Sen, Poverty and Famines: An Essay on Entitlement and Deprivation (Oxford University Press, 1981).", "profundizar": "Madhusree Mukerjee, Churchill's Secret War: The British Empire and the Ravaging of India during World War II (Basic Books, 2010).", "arte": "los dibujos de la hambruna de Zainul Abedin", "arteDesc": "los dibujos de la hambruna de Zainul Abedin (1943); la serie Hungry Bengal de Chittaprosad.", "tipo": null}, {"id": 131, "titulo": "Matanzas de la Partición de la India", "sala": "VI. Siglo XX", "subsala": "Bloque 5 — Subcontinente indio", "fecha": "1947", "lugar": "Panyab, Bengala y norte de la India / Pakistán", "resumen": "La partición de la India británica desata matanzas comunales entre hindúes, musulmanes y sijes: ~1–2 millones de muertos y ~15 millones de desplazados. Violencia intercomunal a escala masiva en el nacimiento de dos Estados.", "investigaciones": "los archivos coloniales y los testimonios orales (proyectos de historia de la Partición).", "profundizar": "Yasmin Khan, The Great Partition: The Making of India and Pakistan (Yale University Press, 2007).", "arte": "las fotografías de Margaret Bourke-White", "arteDesc": "las fotografías de Margaret Bourke-White (1947).", "tipo": null}, {"id": 132, "titulo": "Genocidio de Bangladés (Guerra de Liberación)", "sala": "VI. Siglo XX", "subsala": "Bloque 5 — Subcontinente indio", "fecha": "1971", "lugar": "Pakistán Oriental (actual Bangladés)", "resumen": "El ejército pakistaní (Operación Searchlight) reprime el movimiento independentista bengalí con matanzas masivas y violación sistemática; las cifras van de ~300.000 a ~3 millones de muertos y ~200.000–400.000 violaciones. Atrocidad de escala genocida.", "investigaciones": "los cables diplomáticos estadounidenses (el \"Blood Telegram\").", "profundizar": "Gary J. Bass, The Blood Telegram: Nixon, Kissinger, and a Forgotten Genocide (Knopf, 2013).", "arte": "las fotografías de Raghu Rai y Kishor Parekh", "arteDesc": "las fotografías de Raghu Rai y Kishor Parekh.", "tipo": null}, {"id": 133, "titulo": "Pogromos antisijes de 1984", "sala": "VI. Siglo XX", "subsala": "Bloque 5 — Subcontinente indio", "fecha": "noviembre de 1984", "lugar": "Delhi y otras ciudades de la India", "resumen": "Tras el asesinato de Indira Gandhi por sus guardaespaldas sijes, turbas —con complicidad de cuadros del partido en el poder— matan a ~3.000 o más sijes en Delhi. Violencia comunal con respaldo estatal.", "investigaciones": "las sucesivas comisiones de investigación indias (Misra, Nanavati).", "profundizar": "los informes de PUDR/PUCL, Who Are the Guilty? (1984).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 134, "titulo": "Acción de Hyderabad (Operación Polo)", "sala": "VI. Siglo XX", "subsala": "Bloque 5 — Subcontinente indio", "fecha": "septiembre de 1948", "lugar": "Estado de Hyderabad (India)", "resumen": "Tras la anexión militar india del estado principesco de Hyderabad, estallan matanzas comunales —en parte por las milicias razakar, en parte como represalia contra los musulmanes—; el informe Sunderlal, reservado durante décadas, estimó ~27.000–40.000 muertos (otras estimaciones, mucho mayores).", "investigaciones": "el Informe Sunderlal (1949), largamente clasificado.", "profundizar": "A. G. Noorani, The Destruction of Hyderabad (Hurst, 2014).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 135, "titulo": "Masacre de Nellie", "sala": "VI. Siglo XX", "subsala": "Bloque 5 — Subcontinente indio", "fecha": "18 de febrero de 1983", "lugar": "Nellie, Assam (India)", "resumen": "En el conflicto por la inmigración en Assam, turbas masacran en pocas horas a campesinos musulmanes de origen bengalí; ~2.000 (cifra oficial) hasta ~10.000 muertos, en su mayoría mujeres y niños.", "investigaciones": "la Comisión Tewary, cuyo informe no se hizo público.", "profundizar": "Makiko Kimura, The Nellie Massacre of 1983 (Sage, 2013).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 136, "titulo": "Masacre de Santa María de Iquique", "sala": "VI. Siglo XX", "subsala": "Bloque 6 — Latinoamérica y los movimientos obreros y campesinos", "fecha": "21 de diciembre de 1907", "lugar": "Iquique (Chile)", "resumen": "Miles de obreros del salitre en huelga, junto a sus familias (muchos peruanos y bolivianos), son ametrallados en la Escuela Santa María por orden del general Silva Renard. La cifra oficial (~126–195) contrasta con la memoria social (~3.600). Hito del movimiento obrero chileno.", "investigaciones": "Eduardo Devés, Los que van a morir te saludan: historia de una masacre. Escuela Santa María, Iquique, 1907 (1988).", "profundizar": "Pierre Vayssière y la historiografía del ciclo salitrero.", "arte": "las fotografías de la concentración de obreros", "arteDesc": "las fotografías de la concentración de obreros (1907); su memorialización canónica es musical: la Cantata Santa María de Iquique de Luis Advis, interpretada por Quilapayún (1969).", "tipo": null}, {"id": 137, "titulo": "Masacre de Guayaquil de 1922", "sala": "VI. Siglo XX", "subsala": "Bloque 6 — Latinoamérica y los movimientos obreros y campesinos", "fecha": "15 de noviembre de 1922", "lugar": "Guayaquil (Ecuador)", "resumen": "Una huelga general obrera por mejoras salariales y contra el alza del costo de la vida es reprimida a tiros por el ejército; los muertos —muchos arrojados al río Guayas— se estiman entre varios cientos y ~1.500. Primer gran hito y trauma fundacional del movimiento obrero ecuatoriano.", "investigaciones": "la prensa de la época y la reconstrucción posterior del movimiento obrero ecuatoriano.", "profundizar": "la historiografía sobre los orígenes del sindicalismo en Ecuador, p. ej. los trabajos sobre la \"huelga del 15 de noviembre\" y sus víctimas.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 138, "titulo": "Masacre de las Bananeras", "sala": "VI. Siglo XX", "subsala": "Bloque 6 — Latinoamérica y los movimientos obreros y campesinos", "fecha": "diciembre de 1928", "lugar": "Ciénaga, Magdalena (Colombia)", "resumen": "El ejército colombiano reprime una huelga de trabajadores de la United Fruit Company; las cifras van de ~47 (oficial) a ~2.000 (reivindicaciones). Episodio inmortalizado en la literatura latinoamericana.", "investigaciones": "los debates historiográficos sobre la cifra (Eduardo Posada Carbó) y los archivos del Congreso colombiano.", "profundizar": "Catherine LeGrand y la historiografía sobre el enclave bananero.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 139, "titulo": "La Matanza (El Salvador)", "sala": "VI. Siglo XX", "subsala": "Bloque 6 — Latinoamérica y los movimientos obreros y campesinos", "fecha": "enero de 1932", "lugar": "occidente de El Salvador", "resumen": "Tras un levantamiento comunista e indígena (pipil) liderado por Farabundo Martí y Feliciano Ama, la dictadura de Hernández Martínez ejecuta a ~10.000–30.000 personas (la dictadura admitió ~2.000), arrasando buena parte de la población pipil. Descrita como etnocidio.", "investigaciones": "Thomas P. Anderson, Matanza: El Salvador's Communist Revolt of 1932 (University of Nebraska Press, 1971).", "profundizar": "Héctor Lindo-Fuentes, Erik Ching & Rafael Lara-Martínez, Recordando 1932: La matanza, Roque Dalton y la política de la memoria histórica (FLACSO, 2010).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 140, "titulo": "Masacre del Perejil", "sala": "VI. Siglo XX", "subsala": "Bloque 6 — Latinoamérica y los movimientos obreros y campesinos", "fecha": "octubre de 1937", "lugar": "frontera domínico-haitiana (República Dominicana)", "resumen": "El dictador Rafael Trujillo ordena el asesinato de la población haitiana de la zona fronteriza; ~15.000–20.000 muertos. Limpieza étnica de Estado contra una población vulnerable.", "investigaciones": "los trabajos de Richard Lee Turits y la documentación diplomática de la época.", "profundizar": "Richard Lee Turits, Foundations of Despotism: Peasants, the Trujillo Regime, and Modernity in Dominican History (Stanford University Press, 2003).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 141, "titulo": "Golpe y dictadura militar de Chile", "sala": "VI. Siglo XX", "subsala": "Bloque 6 — Latinoamérica y los movimientos obreros y campesinos", "fecha": "1973–1990", "lugar": "Chile", "resumen": "Tras el golpe del 11 de septiembre de 1973, la dictadura de Pinochet ejecuta y hace desaparecer a más de 3.000 personas (la \"Caravana de la Muerte\", el Estadio Nacional, la DINA) y tortura a decenas de miles. Represión de Estado contra la izquierda y el movimiento popular.", "investigaciones": "el Informe Rettig (Comisión Nacional de Verdad y Reconciliación, 1991) y el Informe Valech (2004).", "profundizar": "Steve J. Stern, Battling for Hearts and Minds: Memory Struggles in Pinochet's Chile (Duke University Press, 2006).", "arte": "las arpilleras de las agrupaciones de familiares", "arteDesc": "las arpilleras de las agrupaciones de familiares; las fotografías del bombardeo de La Moneda.", "tipo": null}, {"id": 142, "titulo": "Guerra Sucia argentina", "sala": "VI. Siglo XX", "subsala": "Bloque 6 — Latinoamérica y los movimientos obreros y campesinos", "fecha": "1976–1983", "lugar": "Argentina", "resumen": "La dictadura militar (Proceso de Reorganización Nacional) secuestra, tortura y hace desaparecer a personas en centros clandestinos como la ESMA; las organizaciones de derechos humanos estiman ~30.000 desaparecidos. Terrorismo de Estado contra la disidencia.", "investigaciones": "CONADEP, Nunca más (1984).", "profundizar": "Marguerite Feitlowitz, A Lexicon of Terror: Argentina and the Legacies of Torture (Oxford University Press, 1998).", "arte": "los pañuelos blancos de las Madres de Plaza de Mayo", "arteDesc": "los pañuelos blancos de las Madres de Plaza de Mayo; la obra de León Ferrari.", "tipo": null}, {"id": 143, "titulo": "Genocidio maya en Guatemala", "sala": "VI. Siglo XX", "subsala": "Bloque 6 — Latinoamérica y los movimientos obreros y campesinos", "fecha": "1981–1983 (guerra civil 1960–1996)", "lugar": "altiplano de Guatemala", "resumen": "Bajo la dictadura de Ríos Montt, el ejército arrasa cientos de aldeas mayas con masacres como la de Las Dos Erres (1982); en el conjunto del conflicto murieron o desaparecieron ~200.000 personas, en su mayoría indígenas. Calificado de genocidio por la justicia.", "investigaciones": "la Comisión para el Esclarecimiento Histórico, Guatemala: Memoria del Silencio (1999).", "profundizar": "Greg Grandin, The Last Colonial Massacre: Latin America in the Cold War (University of Chicago Press, 2004).", "arte": "la obra del fotógrafo Daniel Hernández-Salazar", "arteDesc": "la obra del fotógrafo Daniel Hernández-Salazar (la serie Esclarecimiento).", "tipo": null}, {"id": 144, "titulo": "Patagonia Rebelde", "sala": "VI. Siglo XX", "subsala": "Bloque 6 — Latinoamérica y los movimientos obreros y campesinos", "fecha": "1921–1922", "lugar": "Santa Cruz (Patagonia argentina)", "resumen": "El ejército argentino reprime una huelga de peones rurales: ~1.500 trabajadores fusilados. Represión emblemática del movimiento obrero rural.", "investigaciones": "la investigación documental de Osvaldo Bayer.", "profundizar": "Osvaldo Bayer, La Patagonia rebelde (4 vols., Galerna, 1972–1978).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 145, "titulo": "La Violencia (Colombia)", "sala": "VI. Siglo XX", "subsala": "Bloque 6 — Latinoamérica y los movimientos obreros y campesinos", "fecha": "c. 1948–1958", "lugar": "Colombia", "resumen": "Tras el asesinato de Gaitán y el \"Bogotazo\", una guerra civil no declarada entre liberales y conservadores —con fuerte componente campesino— deja ~200.000 muertos, masacres rurales y desplazamiento masivo.", "investigaciones": "Germán Guzmán, Orlando Fals Borda & Eduardo Umaña, La violencia en Colombia (1962), estudio pionero.", "profundizar": "Gonzalo Sánchez & Donny Meertens, Bandoleros, gamonales y campesinos (El Áncora, 1983).", "arte": "la obra de Alejandro Obregón", "arteDesc": "la obra de Alejandro Obregón (Violencia, 1962) y de Débora Arango.", "tipo": null}, {"id": 146, "titulo": "Masacre de Tlatelolco", "sala": "VI. Siglo XX", "subsala": "Bloque 7 — Movimiento estudiantil", "fecha": "2 de octubre de 1968", "lugar": "Plaza de las Tres Culturas, Tlatelolco (Ciudad de México)", "resumen": "Días antes de los Juegos Olímpicos, fuerzas del Estado disparan contra una manifestación estudiantil; las estimaciones independientes hablan de ~300–400 muertos (la cifra oficial fue mínima). Represión emblemática del movimiento estudiantil.", "investigaciones": "los archivos desclasificados y el trabajo testimonial de Elena Poniatowska.", "profundizar": "Kate Doyle / National Security Archive y la documentación del \"Tlatelolco Massacre\".", "arte": "las fotografías de prensa de la matanza", "arteDesc": "las fotografías de prensa de la matanza.", "tipo": null}, {"id": 147, "titulo": "Levantamiento del Politécnico de Atenas", "sala": "VI. Siglo XX", "subsala": "Bloque 7 — Movimiento estudiantil", "fecha": "noviembre de 1973", "lugar": "Atenas (Grecia)", "resumen": "La dictadura de los coroneles aplasta la ocupación estudiantil del Politécnico con un tanque que derriba la verja; mueren ~24–40 personas. Símbolo de la resistencia a la junta griega.", "investigaciones": "las investigaciones judiciales tras la caída de la junta (1974).", "profundizar": "la historiografía sobre la dictadura de los coroneles (1967–1974).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 148, "titulo": "Masacre de Thammasat", "sala": "VI. Siglo XX", "subsala": "Bloque 7 — Movimiento estudiantil", "fecha": "6 de octubre de 1976", "lugar": "Universidad de Thammasat, Bangkok (Tailandia)", "resumen": "Fuerzas paramilitares y de derecha asaltan la universidad y linchan a estudiantes de izquierda; ~46 (cifra oficial) hasta ~100 o más muertos, con escenas de extrema brutalidad. Represión de Estado del activismo estudiantil.", "investigaciones": "la documentación reunida por el proyecto \"Documentation of Oct 6\".", "profundizar": "Thongchai Winichakul y la historiografía del 6 de octubre.", "arte": "la fotografía de Neal Ulevich", "arteDesc": "la fotografía de Neal Ulevich (Premio Pulitzer 1977).", "tipo": null}, {"id": 149, "titulo": "Levantamiento de Soweto", "sala": "VI. Siglo XX", "subsala": "Bloque 7 — Movimiento estudiantil", "fecha": "16 de junio de 1976", "lugar": "Soweto (Sudáfrica)", "resumen": "La policía del apartheid reprime una protesta de estudiantes negros contra la enseñanza obligatoria en afrikáans; las cifras van de ~176 (oficial) a ~700 muertos. Punto de inflexión de la lucha contra el apartheid.", "investigaciones": "las actas de la Comisión Cillié y, después, la Comisión de la Verdad y la Reconciliación.", "profundizar": "la historiografía del movimiento de la Conciencia Negra (Steve Biko) y de 1976.", "arte": "la fotografía de Sam Nzima del cuerpo de Hector Pieterson", "arteDesc": "la fotografía de Sam Nzima del cuerpo de Hector Pieterson (1976).", "tipo": null}, {"id": 150, "titulo": "Masacre de Tiananmén", "sala": "VI. Siglo XX", "subsala": "Bloque 7 — Movimiento estudiantil", "fecha": "3–4 de junio de 1989", "lugar": "Plaza de Tiananmén, Pekín (China)", "resumen": "El Ejército Popular de Liberación reprime las protestas estudiantiles y obreras por la democracia; las estimaciones de muertos van de cientos a varios miles (cifra censurada por el Estado chino). Represión emblemática de un movimiento prodemocrático.", "investigaciones": "los Tiananmen Papers y los testimonios reunidos por organizaciones de derechos humanos.", "profundizar": "Louisa Lim, The People's Republic of Amnesia: Tiananmen Revisited (Oxford University Press, 2014).", "arte": "la fotografía del \"hombre del tanque\"", "arteDesc": "la fotografía del \"hombre del tanque\" (Tank Man, 1989).", "tipo": null}, {"id": 151, "titulo": "Tiroteo de Kent State", "sala": "VI. Siglo XX", "subsala": "Bloque 7 — Movimiento estudiantil", "fecha": "4 de mayo de 1970", "lugar": "Universidad Estatal de Kent, Ohio (EE. UU.)", "resumen": "La Guardia Nacional dispara contra una protesta estudiantil contra la guerra de Vietnam, matando a 4 estudiantes e hiriendo a 9. Símbolo de la represión del movimiento estudiantil estadounidense.", "investigaciones": "el informe de la Comisión Scranton (1970).", "profundizar": "Thomas M. Grace, Kent State: Death and Dissent in the Long Sixties (University of Massachusetts Press, 2016).", "arte": "la fotografía de John Filo del cuerpo de Jeffrey Miller", "arteDesc": "la fotografía de John Filo del cuerpo de Jeffrey Miller (Premio Pulitzer 1971).", "tipo": null}, {"id": 152, "titulo": "Viernes Negro (Teherán)", "sala": "VI. Siglo XX", "subsala": "Bloque 7 — Movimiento estudiantil", "fecha": "8 de septiembre de 1978", "lugar": "plaza Jaleh, Teherán (Irán)", "resumen": "Las fuerzas del Sah disparan contra una manifestación; ~64–100 muertos según los registros (cifras mucho mayores circularon entonces), lo que radicalizó la Revolución iraní. Represión de un movimiento popular y estudiantil.", "investigaciones": "la investigación posrevolucionaria sobre las cifras (Emadeddin Baghi).", "profundizar": "Charles Kurzman, The Unthinkable Revolution in Iran (Harvard University Press, 2004).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 153, "titulo": "Holodomor (hambruna de Ucrania)", "sala": "VI. Siglo XX", "subsala": "Bloque 8 — Otros focos (terror estalinista, fuera de los siete ejes)", "fecha": "1932–1933", "lugar": "RSS de Ucrania (y otras regiones soviéticas)", "resumen": "La colectivización forzada y las requisas de grano de Stalin provocan una hambruna que mata a ~3,5–5 millones de ucranianos. Reconocida como genocidio por numerosos Estados, dado su carácter de castigo nacional dirigido.", "investigaciones": "los archivos soviéticos desclasificados tras 1991.", "profundizar": "Anne Applebaum, Red Famine: Stalin's War on Ukraine (Doubleday, 2017); Robert Conquest, The Harvest of Sorrow (Oxford University Press, 1986).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 154, "titulo": "El Gran Terror y el Gulag", "sala": "VI. Siglo XX", "subsala": "Bloque 8 — Otros focos (terror estalinista, fuera de los siete ejes)", "fecha": "1937–1938 (Gran Terror); el Gulag, 1930–1953", "lugar": "Unión Soviética", "resumen": "Durante el Gran Terror, el régimen de Stalin ejecuta a ~700.000 personas y envía a millones al sistema de campos del Gulag, donde mueren cientos de miles. Terror de Estado masivo contra la propia población.", "investigaciones": "los archivos de la NKVD desclasificados y el trabajo de Memorial.", "profundizar": "Anne Applebaum, Gulag: A History (Doubleday, 2003); Robert Conquest, The Great Terror (Macmillan, 1968).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 155, "titulo": "Deportación de pueblos enteros", "sala": "VI. Siglo XX", "subsala": "Bloque 8 — Otros focos (terror estalinista, fuera de los siete ejes)", "fecha": "1943–1944", "lugar": "Unión Soviética (Crimea, Cáucaso, etc.)", "resumen": "Stalin ordena la deportación masiva de pueblos enteros acusados de colaboracionismo —tártaros de Crimea, chechenos, ingusetios, kalmukos, alemanes del Volga—; cientos de miles mueren por las condiciones del traslado y el exilio. Limpieza étnica de Estado.", "investigaciones": "los archivos soviéticos y los testimonios de los pueblos deportados.", "profundizar": "J. Otto Pohl, Ethnic Cleansing in the USSR, 1937–1949 (Greenwood, 1999).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 156, "titulo": "Masacre de Katyn", "sala": "VI. Siglo XX", "subsala": "Bloque 8 — Otros focos (terror estalinista, fuera de los siete ejes)", "fecha": "abril–mayo de 1940", "lugar": "Katyn y otros lugares (URSS)", "resumen": "La policía secreta soviética (NKVD) ejecuta a ~22.000 oficiales, policías e intelectuales polacos prisioneros, por orden directa del Politburó. La URSS lo atribuyó a los nazis hasta 1990.", "investigaciones": "los documentos soviéticos desclasificados en 1990–1992.", "profundizar": "Anna M. Cienciala, Natalia S. Lebedeva & Wojciech Materski, Katyn: A Crime Without Punishment (Yale University Press, 2007).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 157, "titulo": "Hambruna kazaja (Asharshylyk)", "sala": "VI. Siglo XX", "subsala": "Bloque 8 — Otros focos (terror estalinista, fuera de los siete ejes)", "fecha": "1930–1933", "lugar": "RSS de Kazajistán", "resumen": "La colectivización forzada y la sedentarización de los nómadas kazajos provocan una hambruna que mata a ~1,5 millones de personas, cerca del 38% del pueblo kazajo. Catástrofe estalinista largamente ignorada.", "investigaciones": "los archivos soviéticos desclasificados tras 1991.", "profundizar": "Sarah Cameron, The Hungry Steppe: Famine, Violence, and the Making of Soviet Kazakhstan (Cornell University Press, 2018).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 158, "titulo": "Guerra Civil de Argelia", "sala": "VII. Desde 1989", "subsala": null, "fecha": "1991–2002", "lugar": "Argelia", "resumen": "Tras la anulación de las elecciones ganadas por el FIS, la guerra entre el Estado y los grupos islamistas armados deja ~150.000–200.000 muertos, con matanzas de aldeas enteras (Bentalha, Raïs, 1997) cuya autoría sigue en disputa.", "investigaciones": "los informes de organizaciones de derechos humanos y la prensa argelina.", "profundizar": "Luis Martinez, The Algerian Civil War, 1990–1998 (Hurst, 2000).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 159, "titulo": "Guerra Civil de Sierra Leona", "sala": "VII. Desde 1989", "subsala": null, "fecha": "1991–2002", "lugar": "Sierra Leona", "resumen": "La guerra entre el Estado y el Frente Revolucionario Unido (RUF) deja ~50.000–70.000 muertos y se caracteriza por mutilaciones masivas (amputaciones), niños soldados y violación sistemática.", "investigaciones": "la Comisión de la Verdad y la Reconciliación y el Tribunal Especial para Sierra Leona.", "profundizar": "Lansana Gberie, A Dirty War in West Africa: The RUF and the Destruction of Sierra Leone (Indiana University Press, 2005).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 160, "titulo": "Limpieza étnica en Bosnia (sitio de Sarajevo)", "sala": "VII. Desde 1989", "subsala": null, "fecha": "1992–1995", "lugar": "Bosnia y Herzegovina", "resumen": "Las guerras yugoslavas conllevan la limpieza étnica de poblaciones por las fuerzas serbobosnias: el sitio de Sarajevo (~11.000 muertos, el más largo de una capital en la era moderna), la masacre de Vukovar (1991) y los campos de Omarska y Prijedor (1992).", "investigaciones": "las sentencias del Tribunal Penal Internacional para la ex-Yugoslavia (TPIY).", "profundizar": "Laura Silber & Allan Little, Yugoslavia: Death of a Nation (Penguin, 1996).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 161, "titulo": "Matanzas de Burundi de 1993", "sala": "VII. Desde 1989", "subsala": null, "fecha": "1993", "lugar": "Burundi", "resumen": "El asesinato del presidente hutu electo, Melchior Ndadaye, por militares tutsis desata matanzas interétnicas masivas; ~50.000–100.000 o más muertos. Una comisión de la ONU calificó parte de los hechos de genocidio.", "investigaciones": "el informe de la Comisión Internacional de Investigación de la ONU (1996).", "profundizar": "René Lemarchand, Burundi: Ethnic Conflict and Genocide (Cambridge University Press, 1996).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 162, "titulo": "Guerras de Chechenia (asedios de Grozni)", "sala": "VII. Desde 1989", "subsala": null, "fecha": "1994–1996 y 1999–2000", "lugar": "Chechenia (Rusia)", "resumen": "Las dos guerras rusas en Chechenia arrasan la capital, Grozni, con bombardeos masivos y matanzas de civiles (la masacre de Samashki, 1995); decenas de miles de muertos civiles. Represión de un movimiento independentista.", "investigaciones": "los informes de Memorial y de organizaciones internacionales.", "profundizar": "Anna Politkovskaya, A Small Corner of Hell: Dispatches from Chechnya (University of Chicago Press, 2003).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 163, "titulo": "Guerra de Kosovo (masacre de Račak)", "sala": "VII. Desde 1989", "subsala": null, "fecha": "1998–1999", "lugar": "Kosovo", "resumen": "Las fuerzas serbias reprimen a la población albanokosovar con matanzas (Račak, enero de 1999, ~45 muertos) y una limpieza étnica que expulsó a cientos de miles; ~13.000 muertos en total. Detonó la intervención de la OTAN.", "investigaciones": "las verificaciones de la OSCE y las sentencias del TPIY.", "profundizar": "Tim Judah, Kosovo: War and Revenge (Yale University Press, 2000).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 164, "titulo": "Segunda Guerra del Congo", "sala": "VII. Desde 1989", "subsala": null, "fecha": "1998–2003", "lugar": "República Democrática del Congo", "resumen": "La \"Guerra Mundial africana\", con la intervención de varios países, causa ~3,8 millones de muertos durante el conflicto (la cifra de ~5,4 millones hasta 2007 está metodológicamente disputada), en su gran mayoría por hambre y enfermedad. El conflicto más letal desde la Segunda Guerra Mundial.", "investigaciones": "las encuestas de mortalidad del International Rescue Committee (IRC) y su debate metodológico posterior.", "profundizar": "Jason Stearns, Dancing in the Glory of Monsters: The Collapse of the Congo and the Great War of Africa (PublicAffairs, 2011).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 165, "titulo": "Asesinato de Carlo Giuliani", "sala": "VII. Desde 1989", "subsala": null, "fecha": "20 de julio de 2001", "lugar": "Génova (Italia)", "resumen": "Durante las protestas contra la cumbre del G8, el manifestante altermundista Carlo Giuliani, de 23 años, muere por el disparo de un carabinero y el atropello de un vehículo policial. Única muerte del movimiento antiglobalización en Europa occidental y símbolo temprano de la represión policial de la protesta (junto a la brutal redada de la escuela Díaz).", "investigaciones": "las actuaciones judiciales italianas y los informes sobre la represión en Génova 2001.", "profundizar": "la documentación de Amnistía Internacional sobre la cumbre del G8 de Génova.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 166, "titulo": "Genocidio de Darfur", "sala": "VII. Desde 1989", "subsala": null, "fecha": "2003–2005, con recrudecimiento desde 2023", "lugar": "Darfur (Sudán)", "resumen": "Las milicias yanyauid y el Estado sudanés exterminan a comunidades no árabes (fur, masalit, zaghawa): ~200.000–300.000 muertos y ~2,7 millones de desplazados (2003–05). Desde 2023, las Fuerzas de Apoyo Rápido (RSF, herederas de los yanyauid) reanudan las matanzas (El Geneina, Ardamata); EE. UU. determinó genocidio en 2025.", "investigaciones": "las investigaciones de la Corte Penal Internacional y del Yale Humanitarian Research Lab.", "profundizar": "Gérard Prunier, Darfur: The Ambiguous Genocide (Cornell University Press, 2005).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 167, "titulo": "Masacre de Andiyán", "sala": "VII. Desde 1989", "subsala": null, "fecha": "mayo de 2005", "lugar": "Andiyán (Uzbekistán)", "resumen": "Tropas del gobierno uzbeko abren fuego contra una multitud de manifestantes; las cifras van de ~187 (oficial) a ~1.500 (estimaciones independientes). Represión de Estado de una protesta popular.", "investigaciones": "los informes de Human Rights Watch y de la OSCE.", "profundizar": "la documentación de organizaciones de derechos humanos sobre Andiyán.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 168, "titulo": "Genocidio yazidí (Estado Islámico)", "sala": "VII. Desde 1989", "subsala": null, "fecha": "agosto de 2014", "lugar": "Sinjar (Irak)", "resumen": "El Estado Islámico ataca a la minoría yazidí: ~5.000 hombres asesinados y ~7.000 mujeres y niñas esclavizadas. Reconocido como genocidio por la ONU.", "investigaciones": "el informe de la Comisión de Investigación de la ONU sobre Siria (2016) y el testimonio de Nadia Murad.", "profundizar": "Nadia Murad, The Last Girl (Tim Duggan Books, 2017), memoria de una superviviente.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 169, "titulo": "Guerra de Siria", "sala": "VII. Desde 1989", "subsala": null, "fecha": "2011–2024", "lugar": "Siria", "resumen": "La represión del régimen de al-Asad de las protestas de 2011 deriva en una guerra que deja ~500.000–656.000 muertos, con ataques químicos (Guta, 2013), asedios y ~64.000 muertes documentadas por tortura en prisiones. El régimen cayó en diciembre de 2024.", "investigaciones": "la Red Siria por los Derechos Humanos (SNHR) y el Observatorio Sirio de Derechos Humanos (SOHR).", "profundizar": "Charles R. Lister, The Syrian Jihad (Oxford University Press, 2015).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 170, "titulo": "Genocidio rohinyá", "sala": "VII. Desde 1989", "subsala": null, "fecha": "2016–2017", "lugar": "estado de Rakáin (Myanmar)", "resumen": "El ejército birmano arrasa aldeas de la minoría musulmana rohinyá: ~25.000 o más muertos y ~740.000 personas expulsadas a Bangladés. Calificado de genocidio o limpieza étnica por la ONU.", "investigaciones": "la Misión Internacional Independiente de Investigación de la ONU (2018).", "profundizar": "Francis Wade, Myanmar's Enemy Within: Buddhist Violence and the Making of a Muslim 'Other' (Zed Books, 2017).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 171, "titulo": "Persecución de los uigures", "sala": "VII. Desde 1989", "subsala": null, "fecha": "desde 2017", "lugar": "Sinkiang (China)", "resumen": "El Estado chino interna a más de un millón de uigures y otras minorías musulmanas en campos de \"reeducación\", con trabajo forzado, esterilizaciones y borrado cultural. Calificado por varios Estados de genocidio o crímenes contra la humanidad (cifras de muertos difíciles de establecer; China lo niega).", "investigaciones": "los Xinjiang Police Files y la investigación de Adrian Zenz y otros.", "profundizar": "Darren Byler, In the Camps: China's High-Tech Penal Colony (Columbia Global Reports, 2021).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 172, "titulo": "Masacre de Marikana", "sala": "VII. Desde 1989", "subsala": null, "fecha": "16 de agosto de 2012", "lugar": "Marikana (Sudáfrica)", "resumen": "La policía sudafricana mata a 34 mineros en huelga de la mina de platino de Lonmin. Mayor matanza de manifestantes en la Sudáfrica posapartheid; represión de un conflicto obrero.", "investigaciones": "la Comisión Farlam (Marikana Commission of Inquiry, 2015).", "profundizar": "Peter Alexander et al., Marikana: A View from the Mountain and a Case to Answer (Jacana, 2012).", "arte": "las fotografías de prensa de la matanza", "arteDesc": "las fotografías de prensa de la matanza.", "tipo": null}, {"id": 173, "titulo": "El Baguazo (masacre de Bagua)", "sala": "VII. Desde 1989", "subsala": null, "fecha": "5 de junio de 2009", "lugar": "Curva del Diablo, cerca de Bagua, Amazonas (Perú)", "resumen": "Una operación policial para desalojar a indígenas awajún y wampís que bloqueaban una carretera en protesta contra decretos que abrían la Amazonía a la extracción de recursos termina en un enfrentamiento con ~33 muertos (policías e indígenas); las cifras de civiles muertos y desaparecidos siguen en disputa. Símbolo de la resistencia indígena por la tierra frente al extractivismo.", "investigaciones": "los informes de la Defensoría del Pueblo del Perú y de las comisiones investigadoras del conflicto.", "profundizar": "la documentación de AIDESEP y los estudios sobre el conflicto de Bagua y el movimiento indígena amazónico.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 174, "titulo": "Desaparición de los 43 de Ayotzinapa", "sala": "VII. Desde 1989", "subsala": null, "fecha": "septiembre de 2014", "lugar": "Iguala, Guerrero (México)", "resumen": "Cuarenta y tres estudiantes de la Normal Rural de Ayotzinapa son detenidos y desaparecidos en una operación con participación de policías y crimen organizado, con encubrimiento estatal. Caso emblemático de la violencia contra el activismo estudiantil y de la desaparición forzada en México.", "investigaciones": "el Grupo Interdisciplinario de Expertos Independientes (GIEI) de la CIDH.", "profundizar": "John Gibler, Una historia oral de la infamia: los ataques contra los normalistas de Ayotzinapa (Grijalbo, 2016).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 175, "titulo": "Guerra de Tigré", "sala": "VII. Desde 1989", "subsala": null, "fecha": "2020–2022", "lugar": "región de Tigré (Etiopía)", "resumen": "El gobierno etíope, con tropas eritreas y milicias amhara, libra una guerra contra Tigré marcada por masacres, violación masiva (~120.000+ mujeres) y hambruna inducida por el asedio; estimaciones de ~300.000–600.000 muertos, en su mayoría por inanición. Uno de los conflictos más letales del siglo XXI.", "investigaciones": "los estudios de mortalidad de la Universidad de Gante (Jan Nyssen) y los informes de la ONU.", "profundizar": "Sarah Vaughan & Martin Plaut, Understanding Ethiopia's Tigray War (Hurst, 2023).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 176, "titulo": "Invasión de Ucrania (atrocidades contra civiles)", "sala": "VII. Desde 1989", "subsala": null, "fecha": "desde 2022", "lugar": "Ucrania", "resumen": "La invasión rusa a gran escala conlleva atrocidades documentadas contra civiles (la masacre de Bucha, el asedio de Mariúpol) y bombardeos de zonas residenciales; las cifras de muertos civiles verificadas por la ONU son un recuento mínimo y siguen aumentando. Conflicto en curso.", "investigaciones": "la Misión de Observación de Derechos Humanos de la ONU en Ucrania y las investigaciones de la CPI.", "profundizar": "las fuentes son aún provisionales; conviene consultar los informes actualizados de la ONU y de organizaciones de derechos humanos.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 177, "titulo": "Guerra de Gaza", "sala": "VII. Desde 1989", "subsala": null, "fecha": "desde octubre de 2023", "lugar": "Franja de Gaza", "resumen": "La guerra entre Israel y Hamás, desencadenada por el ataque del 7 de octubre de 2023, ha causado un elevado número de víctimas civiles en Gaza y una grave crisis humanitaria. Las cifras provienen de fuentes en disputa y la calificación jurídica del conflicto es objeto de procedimientos internacionales en curso (CIJ, CPI). El compendio lo registra como conflicto activo, sin adjudicar responsabilidad ni intención.", "investigaciones": "los recuentos —discrepantes— de las autoridades sanitarias de Gaza, de fuentes israelíes, de la ONU y de monitores independientes.", "profundizar": "por tratarse de un conflicto abierto, no existe aún una historiografía asentada; conviene consultar fuentes actuales y contrastadas.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 178, "titulo": "Tiberio y Cayo Graco", "sala": "VIII. Líderes populares", "subsala": "Antigüedad", "fecha": "133 a.C. y 121 a.C.", "lugar": "Roma", "resumen": "Los hermanos Graco, tribunos de la plebe que impulsaron reformas agrarias en favor de los campesinos pobres, son asesinados por la facción senatorial: Tiberio en 133 a.C., apaleado junto a sus seguidores, y Cayo en 121 a.C. Primeros mártires de la lucha popular en Roma.", "investigaciones": "Plutarco (Vidas de Tiberio y Cayo Graco) y Apiano (Guerras Civiles I).", "profundizar": "David Stockton, The Gracchi (Oxford University Press, 1979).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 179, "titulo": "Vercingétorix", "sala": "VIII. Líderes populares", "subsala": "Antigüedad", "fecha": "46 a.C. (capturado en 52 a.C.)", "lugar": "Roma (Cárcer Tuliano)", "resumen": "El caudillo galo que unió a las tribus contra César, derrotado en Alesia, es exhibido en el triunfo de César en Roma y ejecutado (estrangulado) seis años después. Símbolo de la resistencia de un pueblo sometido.", "investigaciones": "Julio César, De Bello Gallico, y Dión Casio.", "profundizar": "Adrian Goldsworthy, Caesar: Life of a Colossus (Yale University Press, 2006).", "arte": "Lionel Royer, Vercingétorix se rinde ante César", "arteDesc": "Lionel Royer, Vercingétorix se rinde ante César (1899), que representa la rendición, no la ejecución.", "tipo": null}, {"id": 180, "titulo": "Crucifixión de Jesús de Nazaret", "sala": "VIII. Líderes populares", "subsala": "Antigüedad", "fecha": "c. 30–33 d.C.", "lugar": "Jerusalén (Judea romana)", "resumen": "Predicador judío y líder de un movimiento popular en Galilea, ejecutado mediante crucifixión —pena romana reservada a esclavos y sediciosos— bajo el prefecto Poncio Pilato. (Su enorme significación religiosa excede el alcance de este compendio, que aquí consigna únicamente el hecho histórico de la ejecución.)", "investigaciones": "los evangelios y las menciones de Flavio Josefo y Tácito.", "profundizar": "Geza Vermes, Jesus the Jew: A Historian's Reading of the Gospels (Collins, 1973).", "arte": "la crucifixión es uno de los temas más representados de toda…", "arteDesc": "la crucifixión es uno de los temas más representados de toda la historia del arte occidental.", "tipo": null}, {"id": 181, "titulo": "William Wallace", "sala": "VIII. Líderes populares", "subsala": "Edad Media", "fecha": "23 de agosto de 1305", "lugar": "Londres", "resumen": "El líder de la resistencia escocesa contra Eduardo I es capturado y sometido al suplicio de ser ahorcado, arrastrado y descuartizado, acusado de traición. Mártir de la causa nacional escocesa.", "investigaciones": "las crónicas inglesas y escocesas de la época.", "profundizar": "Andrew Fisher, William Wallace (Birlinn, 2007).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 182, "titulo": "Jan Hus", "sala": "VIII. Líderes populares", "subsala": "Edad Media", "fecha": "6 de julio de 1415", "lugar": "Constanza (Sacro Imperio)", "resumen": "El reformador religioso checo, crítico de la jerarquía eclesiástica y voz de un movimiento nacional-popular, es condenado por hereje y quemado vivo en el Concilio de Constanza pese a un salvoconducto imperial. Su muerte desató las guerras husitas.", "investigaciones": "las actas del Concilio de Constanza.", "profundizar": "Thomas A. Fudge, Jan Hus: Religious Reform and Social Revolution in Bohemia (I. B. Tauris, 2010).", "arte": "Václav Brožík, Jan Hus ante el Concilio de Constanza", "arteDesc": "Václav Brožík, Jan Hus ante el Concilio de Constanza (1883).", "tipo": null}, {"id": 183, "titulo": "Juana de Arco", "sala": "VIII. Líderes populares", "subsala": "Edad Media", "fecha": "30 de mayo de 1431", "lugar": "Ruan (Normandía)", "resumen": "La campesina que lideró al ejército francés contra los ingleses es capturada, juzgada por un tribunal eclesiástico proinglés y quemada viva por hereje. Líder popular y nacional ejecutada por el poder ocupante.", "investigaciones": "las actas de su proceso (1431) y del proceso de rehabilitación (1456).", "profundizar": "Régine Pernoud & Marie-Véronique Clin, Joan of Arc: Her Story (St. Martin's, 1998).", "arte": "Hermann Stilke, La muerte de Juana de Arco", "arteDesc": "Hermann Stilke, La muerte de Juana de Arco (1843); numerosas representaciones posteriores.", "tipo": null}, {"id": 184, "titulo": "Thomas Müntzer", "sala": "VIII. Líderes populares", "subsala": "Edad Moderna temprana", "fecha": "27 de mayo de 1525", "lugar": "Mühlhausen (Sacro Imperio)", "resumen": "El predicador y líder radical de la Guerra de los Campesinos alemanes es capturado tras la derrota de Frankenhausen, torturado y decapitado. Mártir de la mayor revuelta campesina de la Europa premoderna.", "investigaciones": "sus escritos y la correspondencia del conflicto.", "profundizar": "Peter Blickle, The Revolution of 1525 (Johns Hopkins University Press, 1981).", "arte": "Werner Tübke, Panorama de la Guerra de los Campesinos", "arteDesc": "Werner Tübke, Panorama de la Guerra de los Campesinos (1976–1987, Bad Frankenhausen), obra monumental que lo representa.", "tipo": null}, {"id": 185, "titulo": "Yemelián Pugachov", "sala": "VIII. Líderes populares", "subsala": "Edad Moderna temprana", "fecha": "enero de 1775", "lugar": "Moscú", "resumen": "El cosaco que lideró la mayor rebelión campesina del Imperio ruso (1773–1775), haciéndose pasar por el zar Pedro III, es capturado y ejecutado (decapitado y descuartizado) en la Plaza Bolotnaya. Símbolo de la insurrección servil.", "investigaciones": "los archivos imperiales y la Historia de Pugachov de Aleksandr Pushkin (1834).", "profundizar": "John T. Alexander, Emperor of the Cossacks: Pugachev and the Frontier Jacquerie of 1773–1775 (Coronado Press, 1973).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 186, "titulo": "Túpac Amaru II", "sala": "VIII. Líderes populares", "subsala": "Edad Moderna temprana", "fecha": "18 de mayo de 1781", "lugar": "Cuzco (Virreinato del Perú)", "resumen": "José Gabriel Condorcanqui, líder de la mayor rebelión indígena de la América colonial, es capturado y ejecutado en la plaza de Cuzco: obligado a presenciar la muerte de su familia y luego descuartizado. Mártir de la causa indígena andina.", "investigaciones": "las actas del proceso y la documentación virreinal.", "profundizar": "Charles F. Walker, The Tupac Amaru Rebellion (Harvard University Press, 2014).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 187, "titulo": "Nat Turner", "sala": "VIII. Líderes populares", "subsala": "Siglo XIX", "fecha": "11 de noviembre de 1831", "lugar": "Virginia (EE. UU.)", "resumen": "El esclavo predicador que lideró la rebelión de esclavos más mortífera de la historia de EE. UU. (1831) es capturado y ahorcado. Su rebelión y su ejecución endurecieron el régimen esclavista del Sur.", "investigaciones": "The Confessions of Nat Turner, transcripción de Thomas R. Gray (1831).", "profundizar": "Patrick H. Breen, The Land Shall Be Deluged in Blood: A New History of the Nat Turner Revolt (Oxford University Press, 2015).", "arte": "la serie de Jacob Lawrence sobre Nat Turner", "arteDesc": "la serie de Jacob Lawrence sobre Nat Turner; las ilustraciones de las Confesiones (1831).", "tipo": null}, {"id": 188, "titulo": "Louis Riel", "sala": "VIII. Líderes populares", "subsala": "Siglo XIX", "fecha": "16 de noviembre de 1885", "lugar": "Regina (Canadá)", "resumen": "El líder del pueblo métis, que encabezó dos rebeliones en defensa de sus tierras y derechos frente a la expansión canadiense, es juzgado por traición y ahorcado. Mártir de la causa métis e indígena.", "investigaciones": "las actas de su proceso (1885).", "profundizar": "la historiografía métis y los estudios sobre las rebeliones del Río Rojo y del Noroeste.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 189, "titulo": "Los mártires de Haymarket", "sala": "VIII. Líderes populares", "subsala": "Siglo XIX", "fecha": "11 de noviembre de 1887", "lugar": "Chicago (EE. UU.)", "resumen": "Tras la revuelta de Haymarket (1886) en la lucha por la jornada de ocho horas, cuatro dirigentes anarquistas y obreros (Parsons, Spies, Engel y Fischer) son ahorcados en un juicio amañado. Su ejecución dio origen a la conmemoración del 1.º de Mayo.", "investigaciones": "las actas del juicio y la campaña internacional por su indulto.", "profundizar": "James Green, Death in the Haymarket (Pantheon, 2006).", "arte": "el Monumento a los Mártires de Haymarket", "arteDesc": "el Monumento a los Mártires de Haymarket (escultura, 1893, cementerio de Forest Park, Chicago).", "tipo": null}, {"id": 190, "titulo": "Líderes del Alzamiento de Pascua", "sala": "VIII. Líderes populares", "subsala": "Siglo XX", "fecha": "mayo de 1916", "lugar": "Dublín (Irlanda)", "resumen": "Tras el Alzamiento de Pascua contra el dominio británico, quince de sus líderes —entre ellos Patrick Pearse y el sindicalista James Connolly, fusilado herido en una silla— son ejecutados por fusilamiento. Su muerte galvanizó el movimiento independentista irlandés.", "investigaciones": "las actas de los consejos de guerra británicos.", "profundizar": "Charles Townshend, Easter 1916: The Irish Rebellion (Allen Lane, 2005).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 191, "titulo": "Patrice Lumumba", "sala": "VIII. Líderes populares", "subsala": "Siglo XX", "fecha": "17 de enero de 1961", "lugar": "Katanga (Congo)", "resumen": "El primer jefe de gobierno del Congo independiente, líder anticolonial, es derrocado, entregado a sus enemigos y fusilado con complicidad belga y estadounidense. Su ejecución es emblemática de la violencia neocolonial de la Guerra Fría.", "investigaciones": "la Comisión parlamentaria belga (2001), que reconoció una responsabilidad moral.", "profundizar": "Ludo De Witte, The Assassination of Lumumba (Verso, 2001).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 192, "titulo": "Che Guevara", "sala": "VIII. Líderes populares", "subsala": "Siglo XX", "fecha": "9 de octubre de 1967", "lugar": "La Higuera (Bolivia)", "resumen": "El revolucionario argentino-cubano es capturado por el ejército boliviano —con apoyo de la CIA— y ejecutado al día siguiente sin juicio. Su muerte lo convirtió en icono global de la lucha revolucionaria.", "investigaciones": "los documentos desclasificados de la CIA y el diario de Bolivia.", "profundizar": "Jon Lee Anderson, Che Guevara: A Revolutionary Life (Grove Press, 1997).", "arte": "la fotografía de Alberto Korda Guerrillero Heroico", "arteDesc": "la fotografía de Alberto Korda Guerrillero Heroico (1960), una de las imágenes más reproducidas del mundo.", "tipo": null}, {"id": 193, "titulo": "Ken Saro-Wiwa", "sala": "VIII. Líderes populares", "subsala": "Desde la caída del Muro de Berlín (1989)", "fecha": "10 de noviembre de 1995", "lugar": "Nigeria", "resumen": "El escritor y líder del Movimiento por la Supervivencia del Pueblo Ogoni, que denunció la devastación de la tierra ogoni por la industria petrolera, es ahorcado junto a otros ocho activistas tras un juicio militar. Mártir de la causa indígena y ecologista.", "investigaciones": "los informes de organizaciones de derechos humanos sobre el juicio.", "profundizar": "Ken Saro-Wiwa, A Month and a Day: A Detention Diary (Penguin, 1995).", "arte": "Sokari Douglas Camp, Battle Bus: Living Memorial for Ken…", "arteDesc": "Sokari Douglas Camp, Battle Bus: Living Memorial for Ken Saro-Wiwa (2006).", "tipo": null}, {"id": 194, "titulo": "Nimr al-Nimr", "sala": "VIII. Líderes populares", "subsala": "Desde la caída del Muro de Berlín (1989)", "fecha": "2 de enero de 2016", "lugar": "Arabia Saudí", "resumen": "El clérigo chií, voz de las protestas de la minoría chií saudí durante la Primavera Árabe, es ejecutado por el Estado junto a otras 46 personas, acusado de sedición. Su ejecución provocó una grave crisis regional.", "investigaciones": "los informes de Amnistía Internacional sobre el proceso.", "profundizar": "la documentación de organizaciones de derechos humanos sobre la disidencia en el Golfo.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 195, "titulo": "Estallido social de Chile", "sala": "IX. Violencia policial", "subsala": null, "fecha": "octubre de 2019 – marzo de 2020", "lugar": "Chile", "resumen": "Una protesta masiva contra la desigualdad y el alza del transporte es reprimida por Carabineros con extrema dureza: alrededor de 30 muertos y una cifra sin precedentes de heridos oculares (más de 400 personas con pérdida total o parcial de la visión por perdigones). El INDH y la ONU documentaron violaciones graves de derechos humanos.", "investigaciones": "los informes del Instituto Nacional de Derechos Humanos (INDH) y de la Oficina del Alto Comisionado de la ONU (2019).", "profundizar": "Amnistía Internacional, Ojos sobre Chile: violencia policial y responsabilidad de mando durante el estallido social (2020).", "arte": "la iconografía gráfica del estallido", "arteDesc": "la iconografía gráfica del estallido (el \"perro matapacos\", los murales y las proyecciones de Delight Lab sobre edificios); sin obra pictórica canónica única.", "tipo": null}, {"id": 196, "titulo": "Asesinato de George Floyd y represión de las protestas (EE. UU.)", "sala": "IX. Violencia policial", "subsala": null, "fecha": "mayo–junio de 2020", "lugar": "Estados Unidos", "resumen": "El asesinato de George Floyd, un hombre negro asfixiado por un policía en Mineápolis, desata las mayores protestas por los derechos civiles en décadas (Black Lives Matter); la respuesta policial a las manifestaciones incluye gases, balas de goma y numerosos abusos documentados. Símbolo global contra la violencia policial racista.", "investigaciones": "el juicio y la condena del policía Derek Chauvin (2021) y los informes sobre el uso de la fuerza contra manifestantes.", "profundizar": "Keeanga-Yamahtta Taylor, From #BlackLivesMatter to Black Liberation (Haymarket Books, 2016).", "arte": "los murales de George Floyd surgidos en todo el mundo", "arteDesc": "los murales de George Floyd surgidos en todo el mundo; el arte callejero del movimiento Black Lives Matter.", "tipo": null}, {"id": 197, "titulo": "Masacre de Lekki (#EndSARS, Nigeria)", "sala": "IX. Violencia policial", "subsala": null, "fecha": "octubre de 2020", "lugar": "Lagos (Nigeria)", "resumen": "El movimiento juvenil #EndSARS contra la brutalidad de una unidad policial culmina cuando las fuerzas de seguridad abren fuego contra manifestantes pacíficos en el peaje de Lekki; el número de muertos fue ocultado y sigue en disputa (Amnistía documentó al menos doce). Emblema de la represión de la protesta juvenil en África.", "inves
