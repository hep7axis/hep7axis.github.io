güedad", "subsala": null, "fecha": "146 a.C.", "lugar": "Cartago (actual Túnez)", "resumen": "Fin de la Tercera Guerra Púnica: Roma (Escipión Emiliano) arrasa la ciudad tras un asedio brutal; la mayoría de la población muere y los supervivientes (~50.000 según las fuentes antiguas [?]) son esclavizados. Aniquilación deliberada de una civilización rival. Fuentes: Apiano (Púnica), fragmentos de Polibio.", "investigaciones": "Adrian Goldsworthy, The Fall of Carthage: The Punic Wars 265–146 BC (Cassell, 2003; también editado como The Punic Wars).", "profundizar": "Richard Miles, Carthage Must Be Destroyed: The Rise and Fall of an Ancient Civilization (Allen Lane, 2010).", "arte": "J", "arteDesc": "J. M. W. Turner, The Decline of the Carthaginian Empire (1817, Tate). Evocación romántica posterior, no una representación de la matanza en sí.", "tipo": null}, {"id": 8, "titulo": "Saqueo de Corinto", "sala": "II. Antigüedad", "subsala": null, "fecha": "146 a.C.", "lugar": "Corinto (Grecia)", "resumen": "El mismo año que Cartago, Roma (Lucio Mumio) destruye Corinto: los hombres son masacrados, las mujeres y niños esclavizados, la ciudad incendiada y saqueada. Marca el fin de la independencia griega. Fuentes: Pausanias (VII), Polibio.", "investigaciones": "Erich S. Gruen, The Hellenistic World and the Coming of Rome (University of California Press, 1984), análisis de referencia sobre la expansión romana en el mundo griego.", "profundizar": "Robin Waterfield, Taken at the Flood: The Roman Conquest of Greece (Oxford University Press, 2014).", "arte": "Tony Robert-Fleury, Le Dernier Jour de Corinthe", "arteDesc": "Tony Robert-Fleury, Le Dernier Jour de Corinthe (El último día de Corinto, 1870, Musée d'Orsay). Recreación académica posterior.", "tipo": null}, {"id": 9, "titulo": "Primera Guerra Servil de Sicilia", "sala": "II. Antigüedad", "subsala": null, "fecha": "c. 135–132 a.C.", "lugar": "Sicilia (República romana)", "resumen": "La primera gran rebelión de esclavos de la Antigüedad, encabezada por Eunus y Cleón, llega a reunir a decenas de miles de esclavos antes de ser aplastada por Roma; miles son ejecutados o crucificados. Precedente directo de la revuelta de Espartaco.", "investigaciones": "Diodoro Sículo (Biblioteca histórica, libro XXXIV), principal fuente antigua.", "profundizar": "Keith Bradley, Slavery and Rebellion in the Roman World, 140 B.C.–70 B.C. (Indiana University Press, 1989).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 10, "titulo": "Segunda Guerra Servil de Sicilia", "sala": "II. Antigüedad", "subsala": null, "fecha": "c. 104–100 a.C.", "lugar": "Sicilia (República romana)", "resumen": "Una segunda gran rebelión de esclavos sacude la isla bajo Salvio (Trifón) y Atenión; tras su derrota a manos del cónsul Manio Aquilio, los últimos cautivos, condenados a las fieras en Roma, prefieren matarse entre sí. Eslabón entre la primera revuelta servil y la de Espartaco.", "investigaciones": "Diodoro Sículo (Biblioteca histórica, libro XXXVI), principal fuente antigua.", "profundizar": "Theresa Urbainczyk, Slave Revolts in Antiquity (Acumen, 2008).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 11, "titulo": "Tercera Guerra Servil (revuelta de Espartaco)", "sala": "II. Antigüedad", "subsala": null, "fecha": "73–71 a.C.", "lugar": "Italia romana (sur de la península y Vía Apia)", "resumen": "Gran revuelta de esclavos aplastada por Craso. Tras la derrota, ~6.000 cautivos son crucificados a lo largo de la Vía Apia entre Capua y Roma como advertencia. El levantamiento subalterno por excelencia en la Antigüedad. Fuentes: Apiano (Guerras Civiles I), Plutarco (Craso), fragmentos de Salustio.", "investigaciones": "Barry Strauss, The Spartacus War (Simon & Schuster, 2009); Brent D. Shaw, Spartacus and the Slave Wars: A Brief History with Documents (Bedford/St. Martin's, 2001), compendio de las fuentes antiguas traducidas y comentadas.", "profundizar": "Keith Bradley, Slavery and Rebellion in the Roman World, 140 B.C.–70 B.C. (Indiana University Press, 1989).", "arte": "Denis Foyatier, escultura Spartacus", "arteDesc": "Denis Foyatier, escultura Spartacus (1830, Museo del Louvre). Representaciones posteriores escasas y casi siempre idealizadas.", "tipo": null}, {"id": 12, "titulo": "Matanzas de la conquista de las Galias", "sala": "II. Antigüedad", "subsala": null, "fecha": "58–51 a.C.", "lugar": "Galia (actual Francia y aledaños)", "resumen": "Las campañas de Julio César causan cientos de miles de muertos y esclavizados según su propio relato. Episodios destacados: la matanza de los habitantes de Avárico (52 a.C.) y las mutilaciones masivas tras Uxellodunum. Exterminio sistemático de poblaciones sometidas. Fuente primaria: Julio César, De Bello Gallico.", "investigaciones": "Adrian Goldsworthy, Caesar: Life of a Colossus (Yale University Press, 2006). El carácter genocida de algunas campañas es analizado por Ben Kiernan, Blood and Soil: A World History of Genocide and Extermination from Sparta to Darfur (Yale University Press, 2007).", "profundizar": "Kathryn Welch & Anton Powell (eds.), Julius Caesar as Artful Reporter: The War Commentaries as Political Instruments (Classical Press of Wales, 1998), sobre la dimensión propagandística del relato cesariano.", "arte": "Lionel Royer, Vercingétorix se rinde ante César", "arteDesc": "Lionel Royer, Vercingétorix se rinde ante César (1899, Musée Crozatier). Pintura académica posterior centrada en la rendición, no en las matanzas.", "tipo": null}, {"id": 13, "titulo": "Represión de la revuelta de Boudica", "sala": "II. Antigüedad", "subsala": null, "fecha": "60–61 d.C.", "lugar": "Britania romana", "resumen": "Tras la revuelta de los icenos liderada por Boudica, Roma reprime con dureza extrema; las fuentes hablan de decenas de miles de muertos y de represalias contra la población britana sometida. Fuentes: Tácito (Anales XIV; Agrícola), Dión Casio (LXII).", "investigaciones": "Graham Webster, Boudica: The British Revolt against Rome AD 60 (Batsford, 1978), estudio de referencia.", "profundizar": "Miranda Aldhouse-Green, Boudica Britannia (Pearson Longman, 2006).", "arte": "Thomas Thornycroft, grupo escultórico Boadicea and Her Daughters", "arteDesc": "Thomas Thornycroft, grupo escultórico Boadicea and Her Daughters (Londres, instalado en 1902). Exalta a la reina rebelde, no la represión.", "tipo": null}, {"id": 14, "titulo": "Persecución neroniana de los cristianos", "sala": "II. Antigüedad", "subsala": null, "fecha": "64 d.C.", "lugar": "Roma", "resumen": "Tras el gran incendio de Roma, según Tácito, Nerón culpa a la minoría cristiana y ordena ejecuciones públicas atroces (crucifixiones y quemas como antorchas vivientes). Persecución del Estado contra un grupo religioso sin poder. Fuente: Tácito, Anales XV, 44.", "investigaciones": "Brent D. Shaw, \"The Myth of the Neronian Persecution\", Journal of Roman Studies 105 (2015): 73–100, que cuestiona la historicidad misma de la persecución y la considera posible construcción cristiana posterior. Debate: réplica de Christopher P. Jones (New Testament Studies 63, 2017) y contrarréplica de Shaw (2018).", "profundizar": "Candida Moss, The Myth of Persecution: How Early Christians Invented a Story of Martyrdom (HarperOne, 2013).", "arte": "Henryk Siemiradzki, Las antorchas de Nerón", "arteDesc": "Henryk Siemiradzki, Las antorchas de Nerón (1876, Museo Nacional de Cracovia); Jean-Léon Gérôme, La última oración de los mártires cristianos (1883, Walters Art Museum). Ambas posteriores.", "tipo": null}, {"id": 15, "titulo": "Destrucción de Jerusalén (Primera Guerra Judeo-Romana)", "sala": "II. Antigüedad", "subsala": null, "fecha": "70 d.C.", "lugar": "Jerusalén", "resumen": "Tito sitia y toma Jerusalén; destrucción del Segundo Templo, matanza masiva de habitantes y esclavización de los supervivientes. Punto de inflexión en la historia judía. Fuente primaria: Flavio Josefo, La guerra de los judíos (libros V–VI), testigo contemporáneo de los hechos.", "investigaciones": "Martin Goodman, Rome and Jerusalem: The Clash of Ancient Civilizations (Allen Lane / Knopf, 2007), estudio de referencia sobre el conflicto.", "profundizar": "Steve Mason, A History of the Jewish War, A.D. 66–74 (Cambridge University Press, 2016).", "arte": "Relieve del Arco de Tito", "arteDesc": "Relieve del Arco de Tito (Roma, c. 81–82 d.C.): arte triunfal del vencedor que celebra el saqueo (procesión con la menorá). También Francesco Hayez, La destrucción del Templo de Jerusalén (1867, Gallerie dell'Accademia, Venecia).", "tipo": null}, {"id": 16, "titulo": "Masacre de Tesalónica", "sala": "II. Antigüedad", "subsala": null, "fecha": "abril de 390 d.C.", "lugar": "Tesalónica (Imperio Romano, actual Grecia)", "resumen": "Tras el linchamiento del comandante de la guarnición goda (Buterico) durante un motín popular, el emperador Teodosio I ordena una represalia: las tropas masacran a ~7.000 habitantes congregados en el hipódromo, en unas tres horas. Castigo colectivo del poder imperial contra su propia población civil; el obispo Ambrosio de Milán excomulgó al emperador hasta su penitencia pública. Fuentes: Ambrosio (Epístola 51), y los relatos posteriores de Teodoreto y Sozómeno.", "investigaciones": "Neil B. McLynn, Ambrose of Milan: Church and Court in a Christian Capital (University of California Press, 1994), monografía influyente que reexaminó el papel de Ambrosio y desmitificó el relato de la penitencia.", "profundizar": "Peter Brown, Power and Persuasion in Late Antiquity: Towards a Christian Empire (University of Wisconsin Press, 1992).", "arte": "Anthony van Dyck, San Ambrosio y el emperador Teodosio", "arteDesc": "Anthony van Dyck, San Ambrosio y el emperador Teodosio (c. 1619–20, National Gallery, Londres). Representa la posterior reprimenda del obispo, no la matanza.", "tipo": null}, {"id": 17, "titulo": "Masacre de Verden", "sala": "III. Edad Media", "subsala": null, "fecha": "782", "lugar": "Verden, Sajonia (actual Baja Sajonia, Alemania)", "resumen": "Durante las guerras sajonas, Carlomagno habría ordenado la decapitación de ~4.500 prisioneros sajones en un solo día, como represalia tras una rebelión. La historicidad y el carácter del hecho están discutidos (algunos proponen que el verbo del texto significaba \"deportar\", no \"decapitar\"). Represión imperial franca contra un pueblo sometido y su religión pagana.", "investigaciones": "los Annales regni Francorum (Anales Reales Francos, s. IX) son la fuente; el episodio y su lectura se discuten en la biografía de referencia de Janet L. Nelson, King and Emperor: A New Life of Charlemagne (Allen Lane, 2019).", "profundizar": "Alessandro Barbero, Charlemagne: Father of a Continent (University of California Press, 2004).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 18, "titulo": "Represión de la Rebelión Zanj", "sala": "III. Edad Media", "subsala": null, "fecha": "869–883", "lugar": "sur de Irak (región de Basora), Califato abasí", "resumen": "Esclavos de origen africano oriental (zanj), sometidos a trabajos extenuantes desecando las marismas salinas, se rebelan bajo Ali ibn Muhammad y sostienen un Estado insurgente durante catorce años, hasta ser aplastados por el ejército abasí. Una de las mayores revueltas de esclavos de la historia (las cifras de víctimas que dan las fuentes medievales son poco fiables y muy exageradas).", "investigaciones": "la crónica de al-Tabari, Tarij al-rusul wa-l-muluk (s. IX–X), principal fuente contemporánea.", "profundizar": "Alexandre Popovic, The Revolt of African Slaves in Iraq in the 3rd/9th Century (Markus Wiener, 1999).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 19, "titulo": "Masacre del día de San Bricio", "sala": "III. Edad Media", "subsala": null, "fecha": "13 de noviembre de 1002", "lugar": "Reino de Inglaterra", "resumen": "El rey Etelredo II (\"el Indeciso\") ordena matar a \"todos los daneses\" en Inglaterra ante el temor de una conspiración. Su alcance real está discutido (probablemente masacres urbanas localizadas, no un exterminio total). La fosa común hallada en el St John's College de Oxford (2008), con restos de varones de origen escandinavo, se ha vinculado —con debate— al episodio.", "investigaciones": "la excavación de la fosa común del St John's College, Oxford (2008), con datación por radiocarbono y análisis isotópico que apunta a víctimas de origen escandinavo.", "profundizar": "Levi Roach, Æthelred the Unready (Yale University Press, 2016).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 20, "titulo": "La Devastación del Norte (Harrying of the North)", "sala": "III. Edad Media", "subsala": null, "fecha": "1069–1070", "lugar": "norte de Inglaterra (Yorkshire y comarcas vecinas)", "resumen": "Tras varias revueltas, Guillermo el Conquistador arrasa sistemáticamente el norte: cosechas, ganado y aldeas destruidas, provocando una hambruna masiva. Las estimaciones (muy discutidas) llegan a ~100.000 muertos. Castigo colectivo normando contra la población inglesa sometida.", "investigaciones": "Orderico Vital, Historia Ecclesiastica (s. XII), es la fuente narrativa; el debate sobre la magnitud se apoya en el Domesday Book (1086).", "profundizar": "Marc Morris, The Norman Conquest (Hutchinson, 2012).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 21, "titulo": "Masacres de Renania (pogromos de la Primera Cruzada)", "sala": "III. Edad Media", "subsala": null, "fecha": "1096", "lugar": "Worms, Maguncia, Espira y Colonia (valle del Rin)", "resumen": "Bandas de la \"Cruzada Popular\" (Emicho de Flonheim y otros) masacran las comunidades judías renanas: miles de muertos; muchos judíos optan por el suicidio colectivo (kiddush ha-Shem) antes que la conversión forzada. Primer gran pogromo asociado a las cruzadas.", "investigaciones": "Robert Chazan, European Jewry and the First Crusade (University of California Press, 1987), que edita y analiza las crónicas hebreas (Salomón bar Simson, Eliezer bar Nathan).", "profundizar": "Jeremy Cohen, Sanctifying the Name of God: Jewish Martyrs and Jewish Memories of the First Crusade (University of Pennsylvania Press, 2004).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 22, "titulo": "Masacre del asedio de Jerusalén", "sala": "III. Edad Media", "subsala": null, "fecha": "15 de julio de 1099", "lugar": "Jerusalén", "resumen": "Tras tomar la ciudad, los cruzados de la Primera Cruzada masacran a buena parte de la población musulmana y judía; las crónicas describen calles \"anegadas en sangre\". Las cifras de las fuentes son exageradas, pero la matanza masiva de civiles es indiscutible. Fuentes: Gesta Francorum, Raimundo de Aguilers, Fulquerio de Chartres; e Ibn al-Qalanisi (lado musulmán).", "investigaciones": "Thomas Asbridge, The First Crusade: A New History (Oxford University Press, 2004).", "profundizar": "Christopher Tyerman, God's War: A New History of the Crusades (Allen Lane, 2006).", "arte": "Émile Signol, Prise de Jérusalem par les croisés, le 15…", "arteDesc": "Émile Signol, Prise de Jérusalem par les croisés, le 15 juillet 1099 (1847, Galerie des Batailles, Versalles). Posterior.", "tipo": null}, {"id": 23, "titulo": "Masacre de York (Clifford's Tower)", "sala": "III. Edad Media", "subsala": null, "fecha": "16 de marzo de 1190", "lugar": "York, Inglaterra", "resumen": "La comunidad judía de York (~150 personas), refugiada en la torre del castillo, es sitiada por una turba endeudada con ellos y azuzada por nobles locales (Richard Malebisse). Muchos se suicidan (kiddush ha-Shem); los que se rinden son asesinados. Violencia contra una minoría vulnerable, con trasfondo de deudas y fervor cruzado.", "investigaciones": "R. B. Dobson, The Jews of Medieval York and the Massacre of March 1190 (Borthwick Institute, 1974), estudio fundacional.", "profundizar": "Robin R. Mundill, The King's Jews: Money, Massacre and Exodus in Medieval England (Continuum, 2010).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 24, "titulo": "Saqueo de Constantinopla (Cuarta Cruzada)", "sala": "III. Edad Media", "subsala": null, "fecha": "12–13 de abril de 1204", "lugar": "Constantinopla", "resumen": "Desviada de Tierra Santa, la Cuarta Cruzada toma y saquea durante tres días la capital bizantina cristiana: matanzas, violaciones, profanación de iglesias y expolio masivo (incluida Santa Sofía). Atrocidad de un ejército cristiano contra una población cristiana. Fuentes: Nicetas Coniates, Godofredo de Villehardouin, Roberto de Clary.", "investigaciones": "Jonathan Phillips, The Fourth Crusade and the Sack of Constantinople (Jonathan Cape, 2004).", "profundizar": "Donald M. Nicol, Byzantium and Venice: A Study in Diplomatic and Cultural Relations (Cambridge University Press, 1988).", "arte": "Eugène Delacroix, La entrada de los cruzados en Constantinopla", "arteDesc": "Eugène Delacroix, La entrada de los cruzados en Constantinopla (L'Entrée des croisés à Constantinople, 1840, Museo del Louvre), que muestra a los habitantes implorando clemencia o ya muertos.", "tipo": null}, {"id": 25, "titulo": "Masacre de Béziers (Cruzada albigense)", "sala": "III. Edad Media", "subsala": null, "fecha": "22 de julio de 1209", "lugar": "Béziers, Languedoc (actual Francia)", "resumen": "Al inicio de la Cruzada albigense, los cruzados toman Béziers y masacran indiscriminadamente a su población —cátaros y católicos por igual—. A esta matanza se asocia la frase \"Caedite eos. Novit enim Dominus qui sunt eius\" (\"Matadlos a todos, que Dios reconocerá a los suyos\"), atribuida al legado Arnaldo Amalric por Cesáreo de Heisterbach. Las cifras varían enormemente (de miles a ~20.000).", "investigaciones": "Mark Gregory Pegg, A Most Holy War: The Albigensian Crusade and the Battle for Christendom (Oxford University Press, 2008).", "profundizar": "Laurence W. Marvin, The Occitan War: A Military and Political History of the Albigensian Crusade, 1209–1218 (Cambridge University Press, 2008).", "arte": "iluminaciones medievales de crónicas de la cruzada albigense", "arteDesc": "iluminaciones medievales de crónicas de la cruzada albigense; sin obra pictórica canónica de la matanza misma.", "tipo": null}, {"id": 26, "titulo": "Matanzas de las ciudades de Corasmia (Nishapur y Merv)", "sala": "III. Edad Media", "subsala": null, "fecha": "1220–1221", "lugar": "Nishapur y Merv, Corasmia (actual nordeste de Irán y Turkmenistán)", "resumen": "Durante la invasión mongola del Imperio corasmio, ciudades enteras son arrasadas y su población masacrada. En Nishapur (1221), tras la muerte de un yerno de Gengis Kan, Tolui ordena la matanza total y se erigen pirámides de cráneos; en Merv, Juvayni recoge cifras de cientos de miles (exageradas). Exterminio urbano sistemático.", "investigaciones": "Ata-Malik Juvayni, Tarij-i Yahangushay (Historia del conquistador del mundo, trad. J. A. Boyle, 1958), fuente contemporánea persa; análisis en David Morgan, The Mongols (Blackwell, 1986; 2.ª ed. 2007).", "profundizar": "Timothy May, The Mongol Conquests in World History (Reaktion Books, 2012).", "arte": "miniaturas persas de asedios mongoles", "arteDesc": "miniaturas persas de asedios mongoles (por ejemplo, en las copias del Jami al-Tawarikh de Rashid al-Din, s. XIV).", "tipo": null}, {"id": 27, "titulo": "Invasión mongola de Hungría", "sala": "III. Edad Media", "subsala": null, "fecha": "1241–1242", "lugar": "Reino de Hungría", "resumen": "Tras la batalla de Mohi (abril de 1241), los mongoles devastan Hungría: matanzas masivas de población civil, aldeas arrasadas y hambruna. Las pérdidas demográficas fueron enormes (estimaciones discutidas de hasta la mitad de la población en algunas regiones).", "investigaciones": "Rogerius (Maestro Roger), Carmen Miserabile (s. XIII), testimonio contemporáneo del clérigo cautivo; contexto en Morgan, The Mongols (1986/2007).", "profundizar": "Peter Jackson, The Mongols and the West, 1221–1410 (Pearson Longman, 2005).", "arte": "iluminaciones del Chronicon Pictum", "arteDesc": "iluminaciones del Chronicon Pictum (Crónica Iluminada Húngara, c. 1358) que representan la invasión mongola.", "tipo": null}, {"id": 28, "titulo": "Hoguera de Montségur", "sala": "III. Edad Media", "subsala": null, "fecha": "16 de marzo de 1244", "lugar": "Montségur, Languedoc (actual Francia)", "resumen": "Tras la caída de la fortaleza cátara de Montségur, ~210–220 perfecti (creyentes cátaros) que se negaron a abjurar son quemados vivos en una pira colectiva al pie del castillo (el \"Camp dels Cremats\"). Acto culminante de la cruzada contra el catarismo, comunidad religiosa popular que la Iglesia condenó como herejía.", "investigaciones": "Zoé Oldenbourg, Le Bûcher de Montségur (Massacre at Montségur, Gallimard, 1959), narración histórica clásica.", "profundizar": "Malcolm Barber, The Cathars: Dualist Heretics in Languedoc in the High Middle Ages (Pearson, 2000).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 29, "titulo": "Saqueo de Bagdad (Hulagu)", "sala": "III. Edad Media", "subsala": null, "fecha": "febrero de 1258", "lugar": "Bagdad", "resumen": "El ejército mongol de Hulagu Kan sitia y saquea Bagdad, capital del Califato abasí; matanza masiva de habitantes (cifras desde decenas de miles hasta cientos de miles, exageradas en las fuentes), ejecución del califa al-Musta'sim y destrucción de bibliotecas. Fin del Califato abasí.", "investigaciones": "Rashid al-Din, Jami al-Tawarikh (s. XIV), fuente principal; síntesis en Morgan, The Mongols (1986/2007).", "profundizar": "Michael Weiers / Reuven Amitai (eds.), estudios sobre el Ilkanato; y John Man, Kublai Khan (2006), para el contexto de la expansión.", "arte": "miniaturas persas del asedio de Bagdad por Hulagu", "arteDesc": "miniaturas persas del asedio de Bagdad por Hulagu (en copias posteriores del Jami al-Tawarikh de Rashid al-Din y los álbumes Diez).", "tipo": null}, {"id": 30, "titulo": "Pogromos de los Pastorcillos (Cruzada de los Pastores)", "sala": "III. Edad Media", "subsala": null, "fecha": "1320", "lugar": "suroeste de Francia y Corona de Aragón", "resumen": "Bandas campesinas y de pastores (los Pastoureaux) recorren el sur de Francia y el norte de Aragón atacando comunidades judías. En episodios como el de Verdún-sur-Garonne, cientos de judíos mueren (muchos por suicidio colectivo ante la matanza). Violencia popular contra una minoría protegida por la corona.", "investigaciones": "David Nirenberg, Communities of Violence: Persecution of Minorities in the Middle Ages (Princeton University Press, 1996), análisis de referencia del episodio.", "profundizar": "Malcolm Barber, \"The Pastoureaux of 1320\" (Journal of Ecclesiastical History 32, 1981) [?].", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 31, "titulo": "Pogromos de la Peste Negra (masacre de Estrasburgo)", "sala": "III. Edad Media", "subsala": null, "fecha": "14 de febrero de 1349 (oleada general 1348–1351)", "lugar": "Estrasburgo, y ciudades del Rin (Basilea, Friburgo, Maguncia, Colonia)", "resumen": "Acusadas de envenenar pozos y propagar la peste, comunidades judías enteras son exterminadas. En Estrasburgo, ~2.000 judíos son quemados vivos. El estudio de Cohn muestra que los instigadores solían ser patricios y autoridades, no las clases bajas. Hallazgos arqueológicos (fosas de Tàrrega, Cataluña) confirman la violencia.", "investigaciones": "Samuel K. Cohn Jr., \"The Black Death and the Burning of Jews\", Past & Present 196 (2007): 3–36.", "profundizar": "David Nirenberg, Communities of Violence (Princeton University Press, 1996).", "arte": "iluminación contemporánea de la quema de judíos durante la peste", "arteDesc": "iluminación contemporánea de la quema de judíos durante la peste (Bibliothèque royale de Belgique, MS 13076-77, f. 12v, c. 1353, de la crónica de Gilles li Muisis).", "tipo": null}, {"id": 32, "titulo": "La Jacquerie", "sala": "III. Edad Media", "subsala": null, "fecha": "mayo–junio de 1358", "lugar": "Beauvaisis y norte de Francia", "resumen": "Revuelta campesina contra la nobleza en el contexto de la Guerra de los Cien Años y la Peste Negra; los jacques destruyen castillos y matan a varios nobles, pero son aplastados (derrotas en Meaux y en campo abierto hacia el 10 de junio) y sometidos a una sangrienta represión nobiliaria —miles de campesinos masacrados— dirigida por Carlos de Navarra. Fuentes: Froissart, Jean de Venette.", "investigaciones": "Justine Firnhaber-Baker, The Jacquerie of 1358: A French Peasants' Revolt (Oxford University Press, 2021), primera monografía moderna dedicada al tema.", "profundizar": "Samuel K. Cohn Jr., Lust for Liberty: The Politics of Social Revolt in Medieval Europe, 1200–1425 (Harvard University Press, 2006).", "arte": "iluminaciones de las Crónicas de Froissart", "arteDesc": "iluminaciones de las Crónicas de Froissart (manuscritos de la BnF) que representan la Jacquerie y su represión.", "tipo": null}, {"id": 33, "titulo": "Saqueo de Limoges", "sala": "III. Edad Media", "subsala": null, "fecha": "septiembre de 1370", "lugar": "Limoges (actual Francia)", "resumen": "Eduardo de Woodstock (el \"Príncipe Negro\") saquea Limoges tras su deserción hacia Francia; Froissart afirma ~3.000 muertos entre los habitantes (cifra que la historiografía moderna considera muy exagerada, quizá ~300). Episodio emblemático de la violencia de la Guerra de los Cien Años contra población civil.", "investigaciones": "Jean Froissart, Crónicas (s. XIV), fuente principal (y discutida); revisión crítica de la cifra en la historiografía reciente de la Guerra de los Cien Años.", "profundizar": "Jonathan Sumption, The Hundred Years War (vol. II: Trial by Fire, Faber & Faber, 1999).", "arte": "iluminaciones de las Crónicas de Froissart que representan el…", "arteDesc": "iluminaciones de las Crónicas de Froissart que representan el saqueo.", "tipo": null}, {"id": 34, "titulo": "Represión de la Revuelta de los Campesinos", "sala": "III. Edad Media", "subsala": null, "fecha": "junio de 1381", "lugar": "Inglaterra (Londres, Kent, Essex, East Anglia)", "resumen": "La gran revuelta de 1381 (Wat Tyler, John Ball) es desactivada tras el asesinato de Tyler (15 de junio) y reprimida con ejecuciones sumarias y campañas punitivas por los condados. Levantamiento subalterno contra la servidumbre y los impuestos, aplastado por la corona y la nobleza. Fuentes: Anonimalle Chronicle, Froissart, Thomas Walsingham.", "investigaciones": "R. B. Dobson (ed.), The Peasants' Revolt of 1381 (Macmillan, 1970), recopilación de fuentes; Rodney Hilton, Bond Men Made Free: Medieval Peasant Movements and the English Rising of 1381 (Temple Smith, 1973).", "profundizar": "Juliet Barker, England, Arise: The People, the King and the Great Revolt of 1381 (Little, Brown, 2014).", "arte": "iluminación de la muerte de Wat Tyler en un manuscrito de las…", "arteDesc": "iluminación de la muerte de Wat Tyler en un manuscrito de las Crónicas de Froissart (BnF, Fr. 2644).", "tipo": null}, {"id": 35, "titulo": "Saqueo de Isfahán (Timur)", "sala": "III. Edad Media", "subsala": null, "fecha": "1387", "lugar": "Isfahán (actual Irán)", "resumen": "Tras una revuelta de los habitantes contra los recaudadores de impuestos, Timur (Tamerlán) ordena una matanza masiva; las fuentes hablan de ~70.000 muertos y de torres construidas con cráneos. Castigo ejemplar de un conquistador contra una población urbana.", "investigaciones": "Sharaf al-Din Ali Yazdi, Zafarnama (s. XV), crónica oficial timúrida; análisis en Beatrice Forbes Manz, The Rise and Rule of Tamerlane (Cambridge University Press, 1989).", "profundizar": "Justin Marozzi, Tamerlane: Sword of Islam, Conqueror of the World (HarperCollins, 2004).", "arte": "miniaturas timúridas/persas de las campañas de Timur", "arteDesc": "miniaturas timúridas/persas de las campañas de Timur (en manuscritos del Zafarnama); representaciones de las torres de cráneos.", "tipo": null}, {"id": 36, "titulo": "Saqueo de Delhi (Timur)", "sala": "III. Edad Media", "subsala": null, "fecha": "diciembre de 1398", "lugar": "Delhi (actual India)", "resumen": "Timur invade el Sultanato de Delhi; antes de la batalla ordena ejecutar a ~100.000 prisioneros, y tras la toma masacra y esclaviza a la población de la ciudad. Una de las matanzas más sangrientas de la Edad Media.", "investigaciones": "las memorias atribuidas a Timur y el Zafarnama de Yazdi; análisis en Manz, The Rise and Rule of Tamerlane (1989).", "profundizar": "Marozzi, Tamerlane (2004); para el contexto indio, Peter Jackson, The Delhi Sultanate: A Political and Military History (Cambridge University Press, 1999).", "arte": "miniaturas timúridas/mogolas de las campañas de Timur en la…", "arteDesc": "miniaturas timúridas/mogolas de las campañas de Timur en la India (manuscritos del Zafarnama).", "tipo": null}, {"id": 37, "titulo": "Saqueo de Bagdad (Timur)", "sala": "III. Edad Media", "subsala": null, "fecha": "1401", "lugar": "Bagdad", "resumen": "Timur toma de nuevo Bagdad tras una rebelión y ordena una matanza general; las fuentes hablan de ~90.000 muertos y de torres de cráneos erigidas con las cabezas de las víctimas. Segunda gran destrucción de la ciudad en siglo y medio.", "investigaciones": "el Zafarnama de Yazdi como fuente; síntesis en Manz, The Rise and Rule of Tamerlane (1989).", "profundizar": "Marozzi, Tamerlane (2004).", "arte": "miniaturas timúridas de las campañas de Timur", "arteDesc": "miniaturas timúridas de las campañas de Timur; representaciones de torres de cráneos.", "tipo": null}, {"id": 38, "titulo": "Caída y saqueo de Constantinopla", "sala": "III. Edad Media", "subsala": null, "fecha": "29 de mayo de 1453", "lugar": "Constantinopla", "resumen": "El ejército otomano de Mehmed II toma la capital bizantina tras un largo asedio; siguen tres días de saqueo con matanzas y esclavización masiva de la población. Fin del Imperio bizantino. Fuentes: numerosas (cristianas y otomanas), entre ellas el relato de Georgios Sphrantzes.", "investigaciones": "Steven Runciman, The Fall of Constantinople 1453 (Cambridge University Press, 1965), estudio clásico.", "profundizar": "Roger Crowley, Constantinople: The Last Great Siege, 1453 (Faber & Faber, 2005).", "arte": "Jean-Joseph Benjamin-Constant, La entrada de Mehmed II en…", "arteDesc": "Jean-Joseph Benjamin-Constant, La entrada de Mehmed II en Constantinopla (1876); Fausto Zonaro, Mehmed II entrando en Constantinopla (c. 1903). Ambas posteriores.", "tipo": null}, {"id": 39, "titulo": "Toma y matanza de Otranto", "sala": "III. Edad Media", "subsala": null, "fecha": "agosto de 1480", "lugar": "Otranto, Apulia (actual Italia)", "resumen": "El ejército otomano de Gedik Ahmed Pasha (campaña de Mehmed II contra Italia) toma Otranto; sigue una matanza general de la población (cifras de hasta ~12.000 muertos y ~5.000 esclavizados) y, el 14 de agosto, la decapitación de unos 800 varones supervivientes en la \"colina de los Mártires\". La tradición lo atribuye a su negativa a convertirse al islam; varios historiadores (Tateo, Bianchi) discuten esa centralidad y lo leen como represalia de saqueo. Reliquias conservadas en la catedral de Otranto.", "investigaciones": "la discusión historiográfica sobre el carácter del hecho (mártires de la fe vs. represalia militar), con los trabajos de Francesco Tateo y Vito Bianchi.", "profundizar": "Halil İnalcık, The Ottoman Empire: The Classical Age, 1300–1600 (Weidenfeld & Nicolson, 1973), para el contexto de la expansión otomana.", "arte": "arte devocional posterior de los \"Mártires de Otranto\"", "arteDesc": "arte devocional posterior de los \"Mártires de Otranto\" (catedral de Otranto); sin pintura contemporánea de la matanza.", "tipo": null}, {"id": 40, "titulo": "Genocidio y colapso de los taínos de La Española", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "desde 1492 (colapso demográfico hasta c. 1550)", "lugar": "La Española (actual Haití y República Dominicana) y el Caribe", "resumen": "Tras la llegada de Colón, la población taína se desploma por la violencia, la esclavitud, el sistema de encomienda y las epidemias. De cientos de miles (cifras muy discutidas), los taínos quedan casi extintos en pocas décadas. Bartolomé de las Casas lo denunció como exterminio.", "investigaciones": "Bartolomé de las Casas, Brevísima relación de la destrucción de las Indias (1552) e Historia de las Indias, testimonio contemporáneo.", "profundizar": "David E. Stannard, American Holocaust: The Conquest of the New World (Oxford University Press, 1992); Andrés Reséndez, The Other Slavery: The Uncovered Story of Indian Enslavement in America (Houghton Mifflin Harcourt, 2016).", "arte": "los grabados de Theodor de Bry para la edición ilustrada de…", "arteDesc": "los grabados de Theodor de Bry para la edición ilustrada de la Brevísima relación de Las Casas (a partir de 1598), que representan las atrocidades españolas.", "tipo": null}, {"id": 41, "titulo": "Masacre de Caonao", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "1513", "lugar": "Caonao, Cuba", "resumen": "Durante la conquista de Cuba, las tropas españolas masacran a cientos de taínos desarmados reunidos en el poblado de Caonao. Las Casas, presente como capellán, lo describió como una matanza gratuita que marcó su conversión en defensor de los indígenas.", "investigaciones": "Bartolomé de las Casas, Historia de las Indias (s. XVI), testimonio ocular.", "profundizar": "Matthew Restall, Seven Myths of the Spanish Conquest (Oxford University Press, 2003).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 42, "titulo": "Masacre de Cholula", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "octubre de 1519", "lugar": "Cholula (actual Puebla, México)", "resumen": "En marcha hacia Tenochtitlan, Hernán Cortés y sus aliados tlaxcaltecas masacran a miles de habitantes de Cholula (cifras de ~3.000 a 6.000), alegando una emboscada. Episodio clave y discutido de la conquista de México.", "investigaciones": "las Cartas de relación de Cortés, Bernal Díaz del Castillo y el Códice Florentino (Sahagún) como fuentes; Las Casas ofrece la versión condenatoria.", "profundizar": "Hugh Thomas, Conquest: Montezuma, Cortés, and the Fall of Old Mexico (Simon & Schuster, 1993).", "arte": "el Lienzo de Tlaxcala", "arteDesc": "el Lienzo de Tlaxcala (s. XVI) y las ilustraciones del Códice Florentino de Sahagún representan la conquista y sus matanzas.", "tipo": null}, {"id": 43, "titulo": "Matanza del Templo Mayor (fiesta de Tóxcatl)", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "mayo de 1520", "lugar": "Tenochtitlan (actual Ciudad de México)", "resumen": "En ausencia de Cortés, Pedro de Alvarado ordena masacrar a la nobleza y a los danzantes mexicas desarmados reunidos para la fiesta de Tóxcatl en el recinto del Templo Mayor. La matanza desató el levantamiento que llevó a la \"Noche Triste\".", "investigaciones": "el Códice Florentino (Bernardino de Sahagún) recoge la versión indígena; análisis en Camilla Townsend, Fifth Sun: A New History of the Aztecs (Oxford University Press, 2019).", "profundizar": "Inga Clendinnen, Aztecs: An Interpretation (Cambridge University Press, 1991).", "arte": "las ilustraciones del Códice Florentino", "arteDesc": "las ilustraciones del Códice Florentino (Sahagún, s. XVI) representan la matanza de Tóxcatl.", "tipo": null}, {"id": 44, "titulo": "Guerra de los Campesinos alemanes (matanza de Frankenhausen)", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "1524–1525 (batalla de Frankenhausen, 15 de mayo de 1525)", "lugar": "Sacro Imperio (Turingia, Suabia, Franconia)", "resumen": "La mayor revuelta popular europea anterior a 1789: campesinos que exigían el fin de la servidumbre son aplastados por los ejércitos de los príncipes. En Frankenhausen, ~5.000–6.000 campesinos son masacrados; el predicador Thomas Müntzer es capturado y ejecutado. En total murieron ~100.000 campesinos.", "investigaciones": "Peter Blickle, The Revolution of 1525: The German Peasants' War from a New Perspective (Johns Hopkins University Press, 1981).", "profundizar": "Tom Scott & Bob Scribner (eds.), The German Peasants' War: A History in Documents (Humanities Press, 1991).", "arte": "la columna conmemorativa irónica \"a los campesinos vencidos\"…", "arteDesc": "la columna conmemorativa irónica \"a los campesinos vencidos\" de Alberto Durero (en su tratado de geometría, 1525); el ciclo Bauernkrieg (Guerra de los Campesinos) de Käthe Kollwitz (1903–1908).", "tipo": null}, {"id": 45, "titulo": "Masacre de Cajamarca", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "16 de noviembre de 1532", "lugar": "Cajamarca (actual Perú)", "resumen": "Francisco Pizarro tiende una emboscada al Inca Atahualpa y a su séquito desarmado; en pocas horas, los españoles masacran a miles de servidores y nobles incas (cifras de ~2.000 a 7.000) y capturan al Inca, que luego ejecutarían. Inicio de la conquista del Perú.", "investigaciones": "las crónicas de testigos (Francisco de Xerez, Pedro Pizarro) como fuentes; síntesis clásica en John Hemming, The Conquest of the Incas (Macmillan, 1970).", "profundizar": "Kim MacQuarrie, The Last Days of the Incas (Simon & Schuster, 2007).", "arte": "los dibujos de Felipe Guamán Poma de Ayala en Nueva corónica…", "arteDesc": "los dibujos de Felipe Guamán Poma de Ayala en Nueva corónica y buen gobierno (c. 1615) representan la captura y ejecución de Atahualpa.", "tipo": null}, {"id": 46, "titulo": "Masacre de Mérindol (valdenses)", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "1545", "lugar": "Mérindol y el Luberón, Provenza (actual Francia)", "resumen": "Por orden de las autoridades (bajo Francisco I), tropas dirigidas por el barón de Oppède arrasan las aldeas valdenses de Provenza; se destruyen ~22 aldeas, se masacran cientos o miles de personas y se esclaviza a supervivientes. Represión de una minoría religiosa campesina precursora del protestantismo.", "investigaciones": "el episodio se documenta en las actas del proceso posterior contra Oppède y en las crónicas valdenses.", "profundizar": "Gabriel Audisio, The Waldensian Dissent: Persecution and Survival, c.1170–c.1570 (Cambridge University Press, 1999).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 47, "titulo": "Masacre de Nóvgorod", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "enero–febrero de 1570", "lugar": "Nóvgorod (Rusia)", "resumen": "El zar Iván IV \"el Terrible\", sospechando una traición, lanza a sus oprichniki contra la ciudad: durante semanas, miles de habitantes son torturados, ahogados en el río Vóljov y masacrados. Una de las atrocidades emblemáticas de la oprichnina.", "investigaciones": "las crónicas rusas de la época; análisis en Isabel de Madariaga, Ivan the Terrible: First Tsar of Russia (Yale University Press, 2005).", "profundizar": "Robert O. Crummey, The Formation of Muscovy, 1304–1613 (Longman, 1987).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 48, "titulo": "Matanza de San Bartolomé", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "24 de agosto de 1572 (y semanas siguientes)", "lugar": "París y otras ciudades de Francia", "resumen": "Durante las guerras de religión, una oleada de violencia católica —desencadenada tras el asesinato de líderes hugonotes— masacra a los protestantes franceses: ~3.000 muertos en París y quizá ~10.000 en toda Francia. Matanza emblemática de la intolerancia religiosa.", "investigaciones": "Barbara B. Diefendorf, Beneath the Cross: Catholics and Huguenots in Sixteenth-Century Paris (Oxford University Press, 1991).", "profundizar": "Mack P. Holt, The French Wars of Religion, 1562–1629 (Cambridge University Press, 1995).", "arte": "François Dubois, Le massacre de la Saint-Barthélemy", "arteDesc": "François Dubois, Le massacre de la Saint-Barthélemy (c. 1572–1584, Musée cantonal des Beaux-Arts, Lausana), única obra conocida del pintor, posible testigo.", "tipo": null}, {"id": 49, "titulo": "Masacre de la isla de Rathlin", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "julio de 1575", "lugar": "isla de Rathlin (Úlster, Irlanda)", "resumen": "Fuerzas inglesas al servicio del conde de Essex —dirigidas por John Norreys y con Francis Drake al mando de los barcos— masacran a ~600 personas (en su mayoría mujeres, niños y ancianos del clan MacDonnell) refugiadas en la isla. Atrocidad de la conquista isabelina de Irlanda.", "investigaciones": "la correspondencia de Essex y los registros estatales ingleses (State Papers) documentan la matanza.", "profundizar": "Nicholas Canny, Making Ireland British, 1580–1650 (Oxford University Press, 2001).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 50, "titulo": "Saqueo de Amberes (Furia Española)", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "4 de noviembre de 1576", "lugar": "Amberes (actual Bélgica)", "resumen": "Tropas españolas amotinadas por falta de paga asaltan y saquean Amberes durante tres días; masacran a ~7.000–8.000 habitantes e incendian buena parte de la ciudad. Atrocidad de la Guerra de los Ochenta Años contra población civil.", "investigaciones": "las crónicas contemporáneas; análisis en Geoffrey Parker, The Dutch Revolt (Allen Lane, 1977).", "profundizar": "Jonathan I. Israel, The Dutch Republic: Its Rise, Greatness, and Fall, 1477–1806 (Oxford University Press, 1995).", "arte": "grabados contemporáneos de la \"Furia Española\"", "arteDesc": "grabados contemporáneos de la \"Furia Española\" (en las crónicas de la guerra de Flandes).", "tipo": null}, {"id": 51, "titulo": "La caza de brujas europea", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "c. 1580–1630 (auge); proceso amplio s. XV–XVIII", "lugar": "Europa central y occidental (focos: Trier, Würzburg, Bamberg, Escocia)", "resumen": "Decenas de miles de personas —en torno al 80% mujeres, muchas pobres o marginales— son procesadas y ejecutadas por brujería. Los grandes procesos alemanes (Trier 1581–93, ~368 ejecutados; Würzburg y Bamberg 1626–31, ~900–1.000 cada uno) ejemplifican una persecución de los más vulnerables.", "investigaciones": "Brian P. Levack, The Witch-Hunt in Early Modern Europe (Longman, 1987).", "profundizar": "Lyndal Roper, Witch Craze: Terror and Fantasy in Baroque Germany (Yale University Press, 2004).", "arte": "grabados y panfletos de la época", "arteDesc": "grabados y panfletos de la época (ilustraciones de procesos y quemas en pliegos alemanes e ingleses).", "tipo": null}, {"id": 52, "titulo": "Masacre de los sangleyes de Manila", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "1603 (y de nuevo en 1639 y 1662)", "lugar": "Manila (Filipinas, dominio español)", "resumen": "Ante el temor a una sublevación, fuerzas españolas y auxiliares filipinos masacran a la comunidad china (sangleyes) de Manila; en 1603 mueren ~20.000 personas, y nuevas matanzas se repiten en 1639. Violencia colonial contra una minoría económica.", "investigaciones": "la correspondencia colonial española y china documenta los hechos.", "profundizar": "Emma Helen Blair & James Alexander Robertson (eds.), The Philippine Islands, 1493–1898 (55 vols., 1903–09), compilación documental de referencia.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 53, "titulo": "Saqueo de Magdeburgo", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "20 de mayo de 1631", "lugar": "Magdeburgo (Sacro Imperio, actual Alemania)", "resumen": "Durante la Guerra de los Treinta Años, el ejército imperial de Tilly y Pappenheim toma Magdeburgo; el saqueo y el incendio que siguen matan a ~20.000–25.000 habitantes, casi toda la población. Una de las mayores catástrofes civiles de la guerra (la \"magdeburgización\" pasó a significar destrucción total).", "investigaciones": "las crónicas de la guerra; síntesis de referencia en Peter H. Wilson, Europe's Tragedy: A History of the Thirty Years War (Allen Lane, 2009).", "profundizar": "C. V. Wedgwood, The Thirty Years War (Jonathan Cape, 1938).", "arte": "numerosos grabados contemporáneos del saqueo e incendio de…", "arteDesc": "numerosos grabados contemporáneos del saqueo e incendio de Magdeburgo.", "tipo": null}, {"id": 54, "titulo": "Masacre de Mystic (Guerra Pequot)", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "26 de mayo de 1637", "lugar": "Mystic, Connecticut (Nueva Inglaterra)", "resumen": "Colonos ingleses (al mando de John Mason y John Underhill) con aliados narragansett y mohegan rodean e incendian el fuerte pequot de Mystic; ~400–700 personas, en su mayoría mujeres, niños y ancianos, mueren quemadas o abatidas al huir. Matanza fundacional de la colonización de Nueva Inglaterra.", "investigaciones": "los relatos contemporáneos de Mason y Underhill; análisis en Alfred A. Cave, The Pequot War (University of Massachusetts Press, 1996).", "profundizar": "Bernard Bailyn, The Barbarous Years: The Peopling of British North America, 1600–1675 (Knopf, 2012).", "arte": "el grabado contemporáneo del fuerte de Mystic en Newes from…", "arteDesc": "el grabado contemporáneo del fuerte de Mystic en Newes from America de John Underhill (1638).", "tipo": null}, {"id": 55, "titulo": "Rebelión de Shimabara (matanza del castillo de Hara)", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "1637–1638 (caída de Hara, 15 de abril de 1638)", "lugar": "península de Shimabara e islas Amakusa, Kyūshū (Japón)", "resumen": "Campesinos (en su mayoría cristianos), oprimidos por los impuestos del clan Matsukura, el hambre y la persecución religiosa, se sublevan bajo el joven Amakusa Shirō y se atrincheran en el castillo de Hara. El shogunato Tokugawa los sitia con ~125.000 hombres (con apoyo artillero neerlandés) y, al caer el castillo, masacra a los ~37.000 defensores, incluidas mujeres y niños.", "investigaciones": "las cartas del factor neerlandés Nicolaes Couckebacker como fuente contemporánea; análisis en George Elison (Jurgis Elisonas), Deus Destroyed: The Image of Christianity in Early Modern Japan (Harvard University Press, 1973).", "profundizar": "Charles R. Boxer, The Christian Century in Japan, 1549–1650 (University of California Press, 1951).", "arte": "pantallas plegables", "arteDesc": "pantallas plegables (byōbu) que representan el asedio de Hara (por ejemplo, el Shimabara Jinzu Gobyōbu, 1837, Museo de Akizuki).", "tipo": null}, {"id": 56, "titulo": "Masacres de la conquista manchú (Yangzhou y Jiading)", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "1645", "lugar": "Yangzhou y Jiading, Jiangnan (China)", "resumen": "Durante la conquista manchú (Qing) del sur Ming, las tropas del príncipe Dodo masacran a la población de Yangzhou tras su resistencia (los \"Diez Días de Yangzhou\"); poco después, la imposición de la coleta obligatoria provoca las \"tres masacres de Jiading\". Las cifras tradicionales (~800.000 en Yangzhou) se consideran hoy muy exageradas.", "investigaciones": "Wang Xiuchu, Yangzhou shiri ji (Relato de los diez días de Yangzhou), testimonio ocular, traducido por Lynn A. Struve en Voices from the Ming-Qing Cataclysm (Yale University Press, 1998).", "profundizar": "Frederic Wakeman Jr., The Great Enterprise: The Manchu Reconstruction of Imperial Order in Seventeenth-Century China (University of California Press, 1985).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 57, "titulo": "Masacres del levantamiento de Jmelnytsky", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "1648–1649", "lugar": "Ucrania (Confederación polaco-lituana)", "resumen": "Durante la rebelión cosaca de Bohdán Jmelnytsky contra la Confederación, las comunidades judías —vistas como agentes de la nobleza polaca— sufren matanzas masivas, junto con polacos católicos. Las cifras tradicionales (100.000 o más) han sido revisadas: Shaul Stampfer estima ~18.000–20.000 muertos judíos.", "investigaciones": "Nathán ben Moshé Hannover, Yeven Metzulah (Abismo de desesperación, 1653), crónica judía contemporánea; revisión crítica de las cifras en Shaul Stampfer, \"What Actually Happened to the Jews of Ukraine in 1648?\", Jewish History 17:2 (2003).", "profundizar": "Paul Robert Magocsi, A History of Ukraine: The Land and Its Peoples (University of Toronto Press, 2.ª ed., 2010).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 58, "titulo": "Conquista cromwelliana de Irlanda (Drogheda y Wexford)", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "septiembre–octubre de 1649", "lugar": "Drogheda y Wexford (Irlanda)", "resumen": "Durante la reconquista de Irlanda por Oliver Cromwell, la toma de Drogheda (11 de septiembre) y de Wexford (11 de octubre) se saldan con la matanza de la guarnición y de numerosos civiles (~2.000–3.000 y ~2.000 muertos respectivamente). Episodios centrales —y muy discutidos— de la represión inglesa en Irlanda.", "investigaciones": "los despachos del propio Cromwell como fuente; análisis en Micheál Ó Siochrú, God's Executioner: Oliver Cromwell and the Conquest of Ireland (Faber & Faber, 2008).", "profundizar": "Tom Reilly, Cromwell: An Honourable Enemy (Phoenix, 1999), lectura revisionista que matiza las cifras.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 59, "titulo": "La travesía atlántica (Middle Passage) y la trata transatlántica", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "s. XVI–XIX (apogeo ss. XVII–XVIII)", "lugar": "océano Atlántico (entre África occidental y América)", "resumen": "A lo largo de la trata, ~12,5 millones de africanos fueron embarcados y ~1,8 millones murieron durante la travesía por hacinamiento, enfermedad, violencia y suicidio. No es una matanza puntual, sino un sistema sostenido de muerte masiva sobre poblaciones sin poder (incluida en el compendio por su carácter de atrocidad estructural).", "investigaciones": "la Trans-Atlantic Slave Trade Database (proyecto SlaveVoyages, dirigido por David Eltis y otros), que cuantifica los viajes y la mortalidad; y David Eltis & David Richardson, Atlas of the Transatlantic Slave Trade (Yale University Press, 2010).", "profundizar": "Marcus Rediker, The Slave Ship: A Human History (Viking, 2007); Herbert S. Klein, The Atlantic Slave Trade (Cambridge University Press, 2.ª ed., 2010).", "arte": "el diagrama abolicionista del barco negrero Brookes", "arteDesc": "el diagrama abolicionista del barco negrero Brookes (1788); J. M. W. Turner, The Slave Ship (Slavers Throwing Overboard the Dead and Dying, 1840, Museum of Fine Arts, Boston).", "tipo": null}, {"id": 60, "titulo": "Destrucción del Quilombo de Palmares", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "1694 (muerte de Zumbi, 1695)", "lugar": "Serra da Barriga, Alagoas (Brasil colonial)", "resumen": "Palmares, el mayor quilombo (comunidad de esclavos fugados) de América, que llegó a reunir a miles de personas y resistió durante casi todo el siglo XVII a las expediciones portuguesas y neerlandesas, es destruido por una expedición de bandeirantes al mando de Domingos Jorge Velho. Su último líder, Zumbi, es capturado y decapitado al año siguiente. Miles de cimarrones son muertos o reesclavizados.", "investigaciones": "João José Reis & Flávio dos Santos Gomes (orgs.), Liberdade por um fio: História dos quilombos no Brasil (Companhia das Letras, 1996).", "profundizar": "Stuart B. Schwartz, Slaves, Peasants, and Rebels: Reconsidering Brazilian Slavery (University of Illinois Press, 1992).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 61, "titulo": "Saqueo de Delhi por Nader Shah", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "marzo de 1739", "lugar": "Delhi (India mogol)", "resumen": "Tras derrotar al ejército mogol, el sah persa Nader invade Delhi; ante un motín popular, ordena una matanza general (qatl-e-amm) que en un solo día deja ~20.000–30.000 muertos, además del saqueo del tesoro imperial (incluido el Trono del Pavo Real).", "investigaciones": "las crónicas persas y mogolas contemporáneas; síntesis en Michael Axworthy, The Sword of Persia: Nader Shah, from Tribal Warrior to Conquering Tyrant (I. B. Tauris, 2006).", "profundizar": "Michael H. Fisher, A Short History of the Mughal Empire (I. B. Tauris, 2016).", "arte": "miniaturas mogolas y persas de las campañas de Nader Shah", "arteDesc": "miniaturas mogolas y persas de las campañas de Nader Shah.", "tipo": null}, {"id": 62, "titulo": "Represión jacobita tras Culloden", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "1746 (tras la batalla del 16 de abril)", "lugar": "Tierras Altas de Escocia", "resumen": "Tras aplastar el levantamiento jacobita en Culloden, el duque de Cumberland (\"el Carnicero\") ordena ejecuciones sumarias de prisioneros y heridos y campañas punitivas contra la población de las Highlands, seguidas de leyes que desmantelan la sociedad de los clanes.", "investigaciones": "los relatos y registros militares de la campaña; análisis en la historiografía jacobita moderna.", "profundizar": "Murray Pittock, Culloden (Oxford University Press, 2016).", "arte": "David Morier, An Incident in the Rebellion of 1745", "arteDesc": "David Morier, An Incident in the Rebellion of 1745 (1746), pintado usando prisioneros jacobitas como modelos.", "tipo": null}, {"id": 63, "titulo": "Expulsión de los acadianos (Grand Dérangement)", "sala": "IV. Edad Moderna", "subsala": null, "fecha": "1755–1764", "lugar": "Acadia (actual Nueva Escocia y provincias Marítimas, Canadá)", "resumen": "Las autoridades británicas deportan por la fuerza a la población francófona de Acadia (~10.000 personas); miles mueren por naufragios, enfermedad y penurias durante la deportación, y sus tierras son confiscadas. Limpieza étnica de una población civil en el contexto colonial.", "investigaciones": "los registros coloniales británicos; análisis de referencia en John Mack Faragher, A Great and Noble Scheme: The Tragic Story of the Expulsion of the French Acadians from Their American Homeland (W. W. Norton, 2005).", "profundizar": "Naomi E. S. Griffiths, From Migrant to Acadian: A North American Border People, 1604–1755 (McGill-Queen's University Press, 2005).", "arte": "representaciones posteriores ligadas a la iconografía de…", "arteDesc": "representaciones posteriores ligadas a la iconografía de \"Evangeline\"; sin obra contemporánea canónica.", "tipo": null}, {"id": 64, "titulo": "Guerra Negra (exterminio de los aborígenes de Tasmania)", "sala": "V. Siglo XIX", "subsala": "Bloque 1 — Ligado al imperialismo británico", "fecha": "1824–1831 (Línea Negra, 1830)", "lugar": "Tierra de Van Diemen (Tasmania, Australia)", "resumen": "El conflicto entre colonos británicos y aborígenes tasmanos deriva en su casi total exterminio por la violencia, las enfermedades y el desalojo; los supervivientes son deportados a la isla Flinders. Caso paradigmático de aniquilación de un pueblo colonizado.", "investigaciones": "los registros coloniales y los diarios de G. A. Robinson; análisis en Lyndall Ryan, Tasmanian Aborigines: A History Since 1803 (Allen & Unwin, 2012).", "profundizar": "Henry Reynolds, Fate of a Free People (Penguin, 1995).", "arte": "Benjamin Duterrau, The Conciliation", "arteDesc": "Benjamin Duterrau, The Conciliation (1840), que retrata la \"conciliación\" posterior de G. A. Robinson, no la matanza.", "tipo": null}, {"id": 65, "titulo": "Gran Hambruna irlandesa", "sala": "V. Siglo XIX", "subsala": "Bloque 1 — Ligado al imperialismo británico", "fecha": "1845–1852", "lugar": "Irlanda", "resumen": "El tizón de la patata provoca una hambruna que mata a ~1 millón de personas y empuja a otro millón o más a emigrar, mientras Irlanda seguía exportando alimentos bajo la política británica de laissez-faire. La historiografía discute hasta qué punto la respuesta del gobierno agravó deliberadamente la catástrofe.", "investigaciones": "Cecil Woodham-Smith, The Great Hunger: Ireland 1845–1849 (Hamish Hamilton, 1962).", "profundizar": "Cormac Ó Gráda, Black '47 and Beyond: The Great Irish Famine (Princeton University Press, 1999); Christine Kinealy, This Great Calamity: The Irish Famine 1845–52 (Gill & Macmillan, 1994).", "arte": "los grabados contemporáneos de The Illustrated London News", "arteDesc": "los grabados contemporáneos de The Illustrated London News (1847–1849), como la imagen de Bridget O'Donnel.", "tipo": null}, {"id": 66, "titulo": "Represión de la rebelión de Morant Bay", "sala": "V. Siglo XIX", "subsala": "Bloque 1 — Ligado al imperialismo británico", "fecha": "octubre de 1865", "lugar": "Jamaica", "resumen": "Tras la protesta liderada por Paul Bogle, el gobernador Edward John Eyre declara la ley marcial y reprime con extrema dureza: ~439 personas (en su mayoría negras) ejecutadas, ~600 azotadas, ~1.000 viviendas incendiadas; George William Gordon es ahorcado. El caso desató una célebre controversia moral en Gran Bretaña.", "investigaciones": "Gad Heuman, \"The Killing Time\": The Morant Bay Rebellion in Jamaica (Macmillan, 1994).", "profundizar": "Catherine Hall, Civilising Subjects: Metropole and Colony in the English Imagination, 1830–1867 (Polity, 2002).", "arte": "grabados contemporáneos de The Illustrated London News", "arteDesc": "grabados contemporáneos de The Illustrated London News.", "tipo": null}, {"id": 67, "titulo": "Expedición \"punitiva\" de Benín", "sala": "V. Siglo XIX", "subsala": "Bloque 1 — Ligado al imperialismo británico", "fecha": "febrero de 1897", "lugar": "ciudad de Benín (actual Nigeria)", "resumen": "En represalia por una emboscada, una fuerza británica toma, incendia y saquea Benín, depone al oba Ovonramwen y expolia miles de objetos (los \"bronces de Benín\"). Matanza y destrucción de un reino africano al servicio de la expansión imperial.", "investigaciones": "Robert Home, City of Blood Revisited: A New Look at the Benin Expedition of 1897 (Rex Collings, 1982).", "profundizar": "Dan Hicks, The Brutish Museums: The Benin Bronzes, Colonial Violence and Cultural Restitution (Pluto Press, 2020).", "arte": "los propios bronces de Benín, hoy dispersos en museos…", "arteDesc": "los propios bronces de Benín, hoy dispersos en museos occidentales; fotografías contemporáneas de la expedición.", "tipo": null}, {"id": 68, "titulo": "Enfumades del Dahra (Argelia)", "sala": "V. Siglo XIX", "subsala": "Bloque 2 — Ligado al imperialismo francés", "fecha": "18–19 de junio de 1845", "lugar": "macizo del Dahra (Argelia)", "resumen": "Durante la conquista de Argelia, el coronel Pélissier —por orden del gobernador Bugeaud (\"ahumadlos como zorros\")— hace encender hogueras en las bocas de las cuevas donde se refugiaba la tribu Ouled Riah; ~700–1.000 personas (hombres, mujeres y niños) mueren asfixiadas. Forma parte de una serie de enfumades (Sbeha, 1844; Aïn Merane, 1845).", "investigaciones": "las cartas del entonces coronel Saint-Arnaud y la prensa francesa de 1845 (La Réforme) como fuentes contemporáneas.", "profundizar": "Benjamin Claude Brower, A Desert Named Peace: The Violence of France's Empire in the Algerian Sahara, 1844–1902 (Columbia University Press, 2009).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 69, "titulo": "Represión de la revuelta de El Mokrani (Cabilia)", "sala": "V. Siglo XIX", "subsala": "Bloque 2 — Ligado al imperialismo francés", "fecha": "1871", "lugar": "Cabilia (Argelia)", "resumen": "La gran insurrección cabilia liderada por El Mokrani y la cofradía Rahmaniyya es aplastada por Francia: miles de muertos, ejecuciones, enormes multas colectivas y confiscación masiva de tierras tribales en beneficio de los colonos.", "investigaciones": "los archivos coloniales franceses documentan la represión y las sanciones.", "profundizar": "Charles-Robert Ageron, Modern Algeria: A History from 1830 to the Present (Hurst, 1991).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 70, "titulo": "Misión Voulet-Chanoine (Sahel)", "sala": "V. Siglo XIX", "subsala": "Bloque 2 — Ligado al imperialismo francés", "fecha": "1898–1899", "lugar": "actual Níger (Sahel)", "resumen": "La \"Misión África Central\" dirigida por los capitanes Voulet y Chanoine deja un rastro de aldeas arrasadas y poblaciones masacradas (como la matanza de Birni-N'Konni, mayo de 1899). El escándalo estalló en Francia cuando los oficiales se rebelaron y mataron a un superior enviado a detenerlos.", "investigaciones": "los informes oficiales franceses y el escándalo parlamentario; análisis en Bertrand Taithe, The Killer Trail: A Colonial Scandal in the Heart of Africa (Oxford University Press, 2009).", "profundizar": "Taithe, The Killer Trail (2009).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 71, "titulo": "Represión de la insurrección kanak de 1878 (Nueva Caledonia)", "sala": "V. Siglo XIX", "subsala": "Bloque 2 — Ligado al imperialismo francés", "fecha": "1878", "lugar": "Nueva Caledonia (Pacífico francés)", "resumen": "La gran revuelta kanak liderada por el jefe Ataï contra la expansión colonial y el despojo de tierras es aplastada por Francia: ~1.000 kanak y ~200 europeos muertos; la cabeza de Ataï fue enviada a París. Represión de un pueblo indígena colonizado.", "investigaciones": "los registros coloniales franceses; la tradición oral kanak recogida por la etnografía posterior.", "profundizar": "Isabelle Merle, Expériences coloniales: La Nouvelle-Calédonie, 1853–1920 (Belin, 1995).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 72, "titulo": "Masacre de Quíos (Chios)", "sala": "V. Siglo XIX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas (limpiezas étnicas y nacionales)", "fecha": "1822", "lugar": "isla de Quíos (mar Egeo)", "resumen": "Durante la guerra de independencia griega, las tropas otomanas masacran a la población de Quíos en represalia: ~25.000 muertos y ~45.000 esclavizados de una isla de ~120.000 habitantes. Episodio clave en la formación del filohelenismo europeo.", "investigaciones": "las crónicas de la guerra de independencia griega; síntesis en David Brewer, The Greek War of Independence (Overlook Press, 2001).", "profundizar": "Brewer, The Greek War of Independence (2001).", "arte": "Eugène Delacroix, Scène des massacres de Scio", "arteDesc": "Eugène Delacroix, Scène des massacres de Scio (Escenas de las masacres de Quíos, 1824, Museo del Louvre).", "tipo": null}, {"id": 73, "titulo": "Genocidio circasiano", "sala": "V. Siglo XIX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas (limpiezas étnicas y nacionales)", "fecha": "1864 (proceso 1860–1864)", "lugar": "noroeste del Cáucaso (Imperio ruso)", "resumen": "Al concluir la guerra del Cáucaso, Rusia expulsa y extermina a los pueblos circasianos del noroeste del Cáucaso; cientos de miles mueren por la violencia, el hambre y las penurias de la deportación masiva hacia territorio otomano. Limpieza étnica al servicio de la expansión imperial rusa.", "investigaciones": "los informes militares rusos y otomanos de la época.", "profundizar": "Walter Richmond, The Circassian Genocide (Rutgers University Press, 2013).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 74, "titulo": "Levantamiento de Abril búlgaro (masacre de Batak)", "sala": "V. Siglo XIX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas (limpiezas étnicas y nacionales)", "fecha": "abril–mayo de 1876", "lugar": "Bulgaria otomana (Batak, Panagyurishte, Perushtitsa)", "resumen": "La sublevación búlgara es aplastada por tropas regulares e irregulares otomanas (bashi-bazouks): ~15.000–30.000 muertos en unas 65 aldeas. En Batak murieron unos ~5.000 de sus ~7.000 habitantes (cifra disputada). Los reportajes de prensa, los \"Horrores búlgaros\", conmocionaron a Europa.", "investigaciones": "los reportajes contemporáneos de Januarius MacGahan (Daily News) y del diplomático Eugene Schuyler; el panfleto de W. E. Gladstone, Bulgarian Horrors and the Question of the East (1876).", "profundizar": "Mark Mazower, The Balkans: A Short History (Modern Library, 2000).", "arte": "Antoni Piotrowski, La masacre de Batak", "arteDesc": "Antoni Piotrowski, La masacre de Batak (1889); Konstantin Makovsky, Las mártires búlgaras (1877).", "tipo": null}, {"id": 75, "titulo": "Masacres hamidianas de armenios", "sala": "V. Siglo XIX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas (limpiezas étnicas y nacionales)", "fecha": "1894–1896", "lugar": "Imperio otomano (Anatolia oriental, Constantinopla)", "resumen": "Bajo el sultán Abdülhamid II, oleadas de masacres contra la población armenia dejan ~100.000–300.000 muertos. Considerada el precedente directo del genocidio de 1915, en el contexto de la \"cuestión armenia\" y el nacionalismo otomano.", "investigaciones": "los informes diplomáticos y misioneros contemporáneos.", "profundizar": "Donald Bloxham, The Great Game of Genocide: Imperialism, Nationalism, and the Destruction of the Ottoman Armenians (Oxford University Press, 2005).", "arte": "ilustraciones de la prensa europea de la época", "arteDesc": "ilustraciones de la prensa europea de la época (por ejemplo, portadas de Le Petit Journal).", "tipo": null}, {"id": 76, "titulo": "Pogromos antijudíos del Imperio ruso", "sala": "V. Siglo XIX", "subsala": "Bloque 3 — Ligado a discursos nacionalistas (limpiezas étnicas y nacionales)", "fecha": "1881–1884 (primera gran oleada)", "lugar": "Imperio ruso (Zona de Residencia: Ucrania y sur de Rusia)", "resumen": "Tras el asesinato de Alejandro II, una oleada de pogromos golpea a más de 200 comunidades judías, con la aquiescencia o pasividad de las autoridades; le siguen las \"Leyes de Mayo\" y una emigración judía masiva. Violencia contra una minoría en el marco del nacionalismo ruso.", "investigaciones": "los informes y la prensa de la época.", "profundizar": "John D. Klier & Shlomo Lambroza (eds.), Pogroms: Anti-Jewish Violence in Modern Russian History (Cambridge University Press, 1992).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 77, "titulo": "Saqueo e incendio del Antiguo Palacio de Verano (Pekín)", "sala": "V. Siglo XIX", "subsala": "Bloque 4 — China, Indochina y el sudeste asiático", "fecha": "octubre de 1860", "lugar": "Yuanmingyuan, cerca de Pekín", "resumen": "Al final de la Segunda Guerra del Opio, las tropas británicas y francesas saquean y luego incendian, por orden de lord Elgin, el Antiguo Palacio de Verano, en represalia por la tortura de unos prisioneros. Destrucción cultural masiva y violencia colonial sobre China.", "investigaciones": "los relatos de los oficiales británicos y franceses; análisis en James L. Hevia, English Lessons: The Pedagogy of Imperialism in Nineteenth-Century China (Duke University Press, 2003).", "profundizar": "Julia Lovell, The Opium War: Drugs, Dreams and the Making of China (Picador, 2011).", "arte": "las fotografías contemporáneas de Felice Beato", "arteDesc": "las fotografías contemporáneas de Felice Beato (1860), de las primeras del conflicto.", "tipo": null}, {"id": 78, "titulo": "Masacres de la represión del Taiping", "sala": "V. Siglo XIX", "subsala": "Bloque 4 — China, Indochina y el sudeste asiático", "fecha": "1850–1864", "lugar": "sur y centro de China", "resumen": "La guerra civil del Taiping y su represión por el Imperio Qing (con apoyo occidental) causan ~20–30 millones de muertos, en su mayoría por hambre y enfermedad; la caída de Nankín (1864) culmina en una matanza masiva. (Es una guerra civil con atrocidades de ambos bandos; se incluye por la escala de la represión Qing sobre la población.)", "investigaciones": "las crónicas chinas y los relatos de observadores occidentales.", "profundizar": "Stephen R. Platt, Autumn in the Heavenly Kingdom: China, the West, and the Epic Story of the Taiping Civil War (Knopf, 2012); Jonathan D. Spence, God's Chinese Son (Norton, 1996).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 79, "titulo": "Guerra de Aceh", "sala": "V. Siglo XIX", "subsala": "Bloque 4 — China, Indochina y el sudeste asiático", "fecha": "1873–1904 (atrocidades culminantes c. 1904)", "lugar": "Aceh, Sumatra (Indias Orientales Neerlandesas)", "resumen": "La larga y brutal guerra colonial neerlandesa contra el sultanato de Aceh causa decenas de miles de muertos acehneses. La masacre de Kuta Reh (1904), donde tropas neerlandesas mataron a la mayoría de los habitantes de una aldea, incluidas mujeres y niños, quedó documentada en fotografías.", "investigaciones": "los archivos coloniales neerlandeses; Paul van 't Veer, De Atjeh-oorlog (Arbeiderspers, 1969).", "profundizar": "Anthony Reid, The Contest for North Sumatra: Atjeh, the Netherlands and Britain, 1858–1898 (Oxford University Press, 1969).", "arte": "la notoria fotografía neerlandesa de las tropas entre los…", "arteDesc": "la notoria fotografía neerlandesa de las tropas entre los muertos de Kuta Reh (1904).", "tipo": null}, {"id": 80, "titulo": "Conquista francesa de Tonkín y Annam", "sala": "V. Siglo XIX", "subsala": "Bloque 4 — China, Indochina y el sudeste asiático", "fecha": "1883–1886", "lugar": "norte y centro de Vietnam", "resumen": "La \"pacificación\" francesa del norte de Vietnam, en el contexto de las guerras de los Pabellones Negros, conlleva la destrucción de aldeas y la muerte de numerosos civiles. Inicio de la colonización violenta de Indochina.", "investigaciones": "los archivos militares franceses de la conquista.", "profundizar": "Pierre Brocheux & Daniel Hémery, Indochina: An Ambiguous Colonization, 1858–1954 (University of California Press, 2009).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 81, "titulo": "Represalias de la Rebelión de 1857", "sala": "V. Siglo XIX", "subsala": "Bloque 5 — Subcontinente indio", "fecha": "1857–1858", "lugar": "norte de la India (Delhi, Cawnpore, Allahabad, Awadh)", "resumen": "Tras la gran rebelión, las represalias británicas son masivas: ejecuciones sumarias, ahorcamientos en masa, la práctica de \"volar desde cañones\" y la sangrienta reconquista de Delhi (septiembre de 1857), con decenas de miles de indios muertos.", "investigaciones": "William Dalrymple, The Last Mughal: The Fall of a Dynasty, Delhi, 1857 (Bloomsbury, 2006).", "profundizar": "Christopher Hibbert, The Great Mutiny: India 1857 (Allen Lane, 1978).", "arte": "las fotografías de Felice Beato de las ruinas y secuelas", "arteDesc": "las fotografías de Felice Beato de las ruinas y secuelas (1858); Vasili Vereshchaguin, Represión de la rebelión india por los ingleses (c. 1884, obra hoy perdida), que representa las ejecuciones con cañón.", "tipo": null}, {"id": 82, "titulo": "Represión de la rebelión santal (Santhal Hul)", "sala": "V. Siglo XIX", "subsala": "Bloque 5 — Subcontinente indio", "fecha": "1855–1856", "lugar": "Bengala (actual Jharkhand, India)", "resumen": "El levantamiento del pueblo santal contra los terratenientes, los prestamistas y la administración británica es aplastado por el ejército: ~10.000 o más santales muertos. Caso emblemático de insurgencia campesina y subalterna en la India colonial.", "investigaciones": "los registros coloniales británicos; análisis en Ranajit Guha, Elementary Aspects of Peasant Insurgency in Colonial India (Oxford University Press, 1983), obra fundacional de los Subaltern Studies.", "profundizar": "Guha, Elementary Aspects of Peasant Insurgency (1983).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 83, "titulo": "Gran Hambruna de la India (hambruna de Madrás)", "sala": "V. Siglo XIX", "subsala": "Bloque 5 — Subcontinente indio", "fecha": "1876–1878", "lugar": "sur y centro de la India (Madrás, Bombay, Misora)", "resumen": "Una sequía coincide con políticas coloniales de no intervención y exportación continua de grano; el resultado es una hambruna que mata a ~5,5 millones de personas (estimaciones de hasta 10 millones), agravada por las decisiones de la administración del virrey Lytton.", "investigaciones": "Mike Davis, Late Victorian Holocausts: El Niño Famines and the Making of the Third World (Verso, 2001).", "profundizar": "Davis, Late Victorian Holocausts (2001).", "arte": "las fotografías de las víctimas tomadas por Willoughby…", "arteDesc": "las fotografías de las víctimas tomadas por Willoughby Wallace Hooper (1876–1878), de las primeras imágenes de una hambruna.", "tipo": null}, {"id": 84, "titulo": "\"Guerra a muerte\" y reconquista realista", "sala": "V. Siglo XIX", "subsala": "Bloque 6 — Latinoamérica en proceso de independencia", "fecha": "1814–1820", "lugar": "Venezuela y Nueva Granada (actual Colombia)", "resumen": "Durante las guerras de independencia, las represalias realistas son masivas: las matanzas de los llaneros de José Tomás Boves (1814) y la \"Pacificación\" de Pablo Morillo (1815–1816), con ejecuciones de patriotas y civiles. Violencia del poder colonial contra la población insurgente.", "investigaciones": "las memorias y partes militares de la época.", "profundizar": "John Lynch, The Spanish American Revolutions, 1808–1826 (Norton, 1973).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 85, "titulo": "Guerra de Castas de Yucatán", "sala": "V. Siglo XIX", "subsala": "Bloque 6 — Latinoamérica en proceso de independencia", "fecha": "desde 1847 (fase intensa hasta 1901)", "lugar": "península de Yucatán (México)", "resumen": "Gran levantamiento del pueblo maya contra la élite criolla y mestiza, con violencia extrema por ambos lados a lo largo de décadas y una enorme pérdida de población. Caso complejo: insurrección subalterna y, a la vez, represión brutal del Estado y los hacendados.", "investigaciones": "los archivos yucatecos y mexicanos de la época.", "profundizar": "Nelson Reed, The Caste War of Yucatán (Stanford University Press, 1964; ed. rev. 2001).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 86, "titulo": "Ocupación de la Araucanía (\"Pacificación de la Araucanía\")", "sala": "V. Siglo XIX", "subsala": "Bloque 6 — Latinoamérica en proceso de independencia", "fecha": "1861–1883", "lugar": "territorio mapuche al sur del Biobío (Chile)", "resumen": "El Estado chileno conquista militarmente el territorio mapuche independiente: campañas militares, muertes, hambruna, despojo de tierras y confinamiento de la población en reducciones. Sometimiento de un pueblo indígena hasta entonces autónomo.", "investigaciones": "los partes militares y la prensa chilena de la época.", "profundizar": "José Bengoa, Historia del pueblo mapuche (siglos XIX y XX) (Ediciones Sur, 1985).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 87, "titulo": "Guerra de la Triple Alianza (catástrofe demográfica del Paraguay)", "sala": "V. Siglo XIX", "subsala": "Bloque 6 — Latinoamérica en proceso de independencia", "fecha": "1864–1870", "lugar": "Paraguay", "resumen": "En la guerra de Paraguay contra Brasil, Argentina y Uruguay, el país sufre la mayor catástrofe demográfica proporcional de la era moderna: el consenso historiográfico (Whigham y Potthast) estima la pérdida de ~60–70% de la población, con la población masculina diezmada. (Vera Reber propuso cifras mucho menores, refutadas por estudios posteriores.)", "investigaciones": "Thomas L. Whigham, The Paraguayan War: Causes and Early Conduct (University of Nebraska Press, 2002).", "profundizar": "Thomas Whigham & Barbara Potthast y el debate demográfico posterior; Chris Leuchars, To the Bitter End: Paraguay and the War of the Triple Alliance (Greenwood, 2002).", "arte": "las pinturas de Cándido López, soldado-pintor argentino que…", "arteDesc": "las pinturas de Cándido López, soldado-pintor argentino que perdió un brazo en la guerra y la retrató como testigo directo; Pedro Américo, Batalha do Avaí (1877).", "tipo": null}, {"id": 88, "titulo": "La \"Conquista del Desierto\"", "sala": "V. Siglo XIX", "subsala": "Bloque 6 — Latinoamérica en proceso de independencia", "fecha": "1878–1885", "lugar": "Pampa y Patagonia (Argentina)", "resumen": "La campaña militar del general Julio A. Roca contra los pueblos mapuche, tehuelche y ranquel: miles de muertos, ~15.000 o más desplazados, familias separadas y prisioneros enviados a trabajos forzados. Expansión del Estado argentino sobre territorio indígena, al que el discurso oficial llamó \"Desierto\" para negar a quienes lo habitaban.", "investigaciones": "los partes de la campaña y la prensa de la época.", "profundizar": "David Viñas, Indios, ejército y frontera (Siglo XXI, 1982).", "arte": "Juan Manuel Blanes, La ocupación militar del Río Negro", "arteDesc": "Juan Manuel Blanes, La ocupación militar del Río Negro (1896), de signo celebratorio.", "tipo": null}, {"id": 89, "titulo": "Masacre de Canudos", "sala": "V. Siglo XIX", "subsala": "Bloque 6 — Latinoamérica en proceso de independencia", "fecha": "1896–1897", "lugar": "Canudos, Bahía (Brasil)", "resumen": "El ejército brasileño destruye, tras cuatro campañas, el asentamiento de campesinos pobres de Canudos, liderado por el predicador Antônio Conselheiro; ~25.000 personas mueren y los últimos supervivientes son degollados. Aniquilación de una comunidad del sertão tildada de fanática y \"antirrepublicana\".", "investigaciones": "Euclides da Cunha, Os Sertões (1902), crónica clásica de un testigo periodístico.", "profundizar": "Robert M. Levine, Vale of Tears: Revisiting the Canudos Massacre in Northeastern Brazil, 1893–1897 (University of California Press, 1992).", "arte": "las fotografías de Flávio de Barros, fotógrafo oficial de la…", "arteDesc": "las fotografías de Flávio de Barros, fotógrafo oficial de la campaña (1897).", "tipo": null}, {"id": 90, "titulo": "Masacre de Peterloo", "sala": "V. Siglo XIX", "subsala": "Bloque 7 — Otros focos (fuera de los seis ejes anteriores)", "fecha": "16 de agosto de 1819", "lugar": "St Peter's Field, Mánchester (Inglaterra)", "resumen": "La caballería carga contra una concentración pacífica de ~60.000 personas que pedían reforma parlamentaria; ~18 muertos y ~650 heridos. Matanza fundacional de la memoria de la clase obrera británica.", "investigaciones": "Robert Poole, Peterloo: The English Uprising (Oxford University Press, 2019).", "profundizar": "E. P. Thompson, The Making of the English Working Class (Victor Gollancz, 1963).", "arte": "las estampas coloreadas contemporáneas", "arteDesc": "las estampas coloreadas contemporáneas (publicadas por Richard Carlile) y los grabados satíricos de George Cruikshank.", "tipo": null}, {"id": 91, "titulo": "Represión del movimiento ludita", "sala": "V. Siglo XIX", "subsala": "Bloque 7 — Otros focos (fuera de los seis ejes anteriores)", "fecha": "1811–1816 (ejecuciones de York, 1813)", "lugar": "Nottinghamshire, Yorkshire y Lancashire (Inglaterra)", "resumen": "Obreros textiles (tejedores, croppers y calceteros) destruyen los telares mecánicos que arruinaban su sustento; el Estado responde desplegando miles de soldados, convierte en delito capital la rotura de máquinas (Frame-Breaking Act, 1812) y, en la Comisión Especial de York de 1813, ahorca a diecisiete luditas. Represión de la resistencia obrera a la industrialización.", "investigaciones": "E. P. Thompson, The Making of the English Working Class (Victor Gollancz, 1963), que rescató a los luditas de \"la enorme condescendencia de la posteridad\".", "profundizar": "Kirkpatrick Sale, Rebels Against the Future: The Luddites and Their War on the Industrial Revolution (Addison-Wesley, 1995).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 92, "titulo": "Revuelta del Capitán Swing", "sala": "V. Siglo XIX", "subsala": "Bloque 7 — Otros focos (fuera de los seis ejes anteriores)", "fecha": "1830–1831", "lugar": "sur y este de Inglaterra", "resumen": "Los jornaleros agrícolas, empobrecidos y desplazados por las trilladoras mecánicas, se levantan rompiendo máquinas, quemando almiares y exigiendo salarios dignos bajo el nombre mítico del \"Capitán Swing\". Las Comisiones Especiales del gobierno ahorcan a ~19 hombres, encarcelan a cientos y deportan a ~500 a Australia. Mayor revuelta del campesinado inglés del siglo XIX.", "investigaciones": "Eric Hobsbawm & George Rudé, Captain Swing (Lawrence & Wishart, 1969), estudio clásico de la historia social \"desde abajo\".", "profundizar": "Hobsbawm & Rudé, Captain Swing (1969).", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 93, "titulo": "Levantamiento de Merthyr", "sala": "V. Siglo XIX", "subsala": "Bloque 7 — Otros focos (fuera de los seis ejes anteriores)", "fecha": "junio de 1831", "lugar": "Merthyr Tydfil (Gales)", "resumen": "Obreros del hierro y mineros galeses, agobiados por los recortes salariales y las deudas,
