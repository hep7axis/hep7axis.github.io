 "fecha": "diciembre de 2022 – marzo de 2023", "lugar": "Perú (sur andino)", "resumen": "Tras la destitución y el encarcelamiento de Pedro Castillo, las protestas en el sur andino son reprimidas por la policía y el ejército con fuego real: alrededor de 49 civiles muertos —en su mayoría indígenas quechuas y aymaras—, con las masacres de Ayacucho (~10 muertos) y Juliaca (~18 muertos). Amnistía las calificó de \"ejecuciones extrajudiciales\".", "investigaciones": "Human Rights Watch, Decadencia mortal (2023), y Amnistía Internacional, ¿Quién dio la orden? (2024).", "profundizar": "los citados informes de Human Rights Watch y Amnistía Internacional.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": 201, "titulo": "Protestas contra la Ley de Finanzas de Kenia", "sala": "IX. Violencia policial", "subsala": null, "fecha": "junio–agosto de 2024", "lugar": "Kenia", "resumen": "Las protestas juveniles (\"Generación Z\") contra una ley de alzas tributarias culminan el 25 de junio de 2024, cuando los manifestantes irrumpen en el Parlamento y la policía dispara fuego real; la comisión nacional de derechos humanos contabilizó más de 60 muertos, con cientos de heridos y desapariciones forzadas. Represión de una protesta popular descentralizada y sin líderes.", "investigaciones": "los informes de la Comisión Nacional de Derechos Humanos de Kenia (KNCHR, 2024) y de Human Rights Watch.", "profundizar": "la documentación de la KNCHR y de organizaciones de derechos humanos.", "arte": "—", "arteDesc": "", "tipo": null}, {"id": "cierre", "tipo": "cierre", "sala": "Cierre", "subsala": null, "titulo": "Cierre del compendio", "fecha": "c. 5000 a.C. – presente", "lugar": "201 eventos curados", "resumen": "No es —ni podía ser— una enumeración exhaustiva de «toda matanza», sino un canon curado y representativo de la violencia del poder contra lo subalterno a lo largo de unos siete milenios, construido priorizando la verificabilidad sobre la cantidad. La meta nominal de ~1000 entradas debe e         function heptaSVG(stroke, sw, extra){
            return `<svg viewBox="-50 -50 100 100" class="w-full h-full ${extra||''}" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="${HEPTA_POINTS}" fill="none" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round"/></svg>`;
        }
        function norm(s){ return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

        let currentSalaGlobal = null, currentSubsalaGlobal = null;

        // ---------- MENÚ ----------

                const container = document.createElement('div');
                container.className = 'mb-1';
                const hasSubs = item.subsalas.length > 0;
                const mainButton = document.createElement('button');
                mainButton.className = 'nav-main w-full text-left py-2 px-3 flex items-center justify-between gap-2 font-medium tracking-wide text-gray-400 hover:text-raveGreen hover:bg-raveGreen/5 rounded transition-all';

                mainButton.innerHTML = `
                    <span class="truncate">${item.name}</span>

                        const subDiv = document.getElementById(`sub-${slug(item.name)}`);

                        const open = subDiv.classList.toggle('hidden');
                        arrow.style.transform = open ? 'rotate(0deg)' : 'rotate(90deg)';
                        // al abrir, navegar al primer evento de la sala (si tiene sueltos) o primer subbloque
                        if (!open) selectSala(item.name, item.subsalas[0]);
                    } else {
                        selectSala(item.name, null);
                    }
                };
                container.appendChild(mainButton);
                if (hasSubs) {
                    const subContainer = document.createElement('div');
                    subContainer.id = `sub-${slug(item.name)}`;
                    subContainer.className = 'hidden pl-3 mt-1 mb-2 space-y-1 border-l border-raveGreen/10';
                    item.subsalas.forEach(sub => {
                        const n = archiveDatabase.filter(it => it.sala===item.name && it.subsala===sub).length;
                        const subBtn = document.createElement('button');
                        subBtn.className = 'nav-sub w-full text-left py-1 px-2 text-xs text-gray-500 hover:text-electricCyan hover:bg-electricCyan/5 rounded transition-all flex justify-between gap-2';
                        subBtn.dataset.sala = item.name; subBtn.dataset.sub = sub;
                        subBtn.innerHTML = `<span class="truncate">${sub}</span><span class="text-[10px] text-electricCyan/40 shrink-0">${n}</span>`;
                        subBtn.onclick = (ev) => { ev.stopPropagation(); selectSala(item.name, sub); };

                    container.appendChild(subContainer);

        function highlightNav() {
            document.querySelectorAll('.nav-main').forEach(b => b.classList.toggle('nav-active', b.dataset.sala===currentSalaGlobal && !currentSubsalaGlobal));

            if (currentSubsalaGlobal) {
                const sub = document.getElementById(`sub-${slug(currentSalaGlobal)}`);
                const arrow = document.getElementById(`arrow-${slug(currentSalaGlobal)}`);
                if (sub && sub.classList.contains('hidden')) { sub.classList.remove('hidden'); if(arrow) arrow.style.transform='rotate(90deg)'; }

        // ---------- SELECCIÓN ----------
        function selectSala(sala, subsala) {
            currentSalaGlobal = sala;
            currentSubsalaGlobal = subsala || null;
            const full = salaFull[sala] || sala;
            const labelSub = currentSubsalaGlobal ? ` (${currentSubsalaGlobal.split('—')[0].trim()})` : '';
            document.getElementById('active-sala-label').textContent = sala + labelSub;
            document.getElementById('subsala-breadcrumb').textContent = currentSubsalaGlobal ? `${full} › ${currentSubsalaGlobal}` : full;
            itemsFiltrados = archiveDatabase.filter(it => it.sala===sala && it.subsala===currentSubsalaGlobal);
            indexActivo = 0;
            if (itemsFiltrados.length === 0) {
                itemsFiltrados = [{ titulo:"Bloque en construcción", fecha:"—", lugar:"—", resumen:"Este bloque está en proceso de verificación bibliográfica. El canon se entrega por bloques y se amplía de forma continua.", arte:"—", arteDesc:"", investigaciones:"Repositorio público en actualización.", profundizar:"Consulta el archivo .md en la raíz del repositorio.", tipo:"nota" }];

                    <div class="text-[10px] font-mono text-raveGreen/50 tracking-widest uppercase">Hep7axis</div></div>`;

                </div>`;

            updateHash();
            updateDrawer();

        function nextItem(){ if(indexActivo < itemsFiltrados.length-1){ indexActivo++; renderItem(); } }

            navigator.clipboard.writeText(masterPrompt).then(showToast).catch(()=>{

        function showToast(){

        // ---------- BÚSQUEDA ----------
        function openSearch(){
            document.getElementById('search-modal').classList.remove('hidden');

            runSearch('');

        function closeSearch(){ document.getElementById('search-modal').classList.add('hidden'); }
        document.getElementById('search-input').addEventListener('input', e=>runSearch(e.target.value));
        function runSearch(q){
            const box=document.getElementById('search-results');
            const nq=norm(q.trim());
            let res;
            if (nq){
                res = archiveDatabase.filter(it => norm(it.titulo).includes(nq) || norm(it.lugar).includes(nq) || norm(it.resumen).includes(nq) || norm(it.fecha).includes(nq) || norm(it.sala).includes(nq) || (it.subsala && norm(it.subsala).includes(nq)));
            } else {
                res = archiveDatabase.slice(0,40);
            }
            if (res.length===0){ box.innerHTML = `<div class="text-raveGreen/40 font-mono text-sm px-3 py-6 text-center">Sin resultados. Probá con otro término, lugar o año.</div>`; return; }
            box.innerHTML = res.slice(0,60).map(it=>{
                const idLabel = (typeof it.id==='number') ? String(it.id).padStart(3,'0') : '···';
                const loc = it.subsala ? `${it.sala} › ${it.subsala}` : it.sala;
                return `<button onclick="gotoById('${it.id}')" class="w-full text-left px-3 py-2 border border-raveGreen/15 hover:border-raveGreen/50 hover:bg-raveGreen/5 rounded transition-all flex gap-3 items-start">
                    <span class="text-electricMagenta text-xs shrink-0 mt-0.5">${idLabel}</span>
                    <span class="min-w-0 flex-1">
                        <span class="text-white block truncate">${esc(it.titulo)}</span>
                        <span class="text-raveGreen/50 text-[11px] block truncate">${esc(it.fecha)} · ${esc(it.lugar)}</span>
                        <span class="text-electricCyan/40 text-[10px] block truncate uppercase tracking-wider">${esc(loc)}</span>
                    </span></button>`;
            }).join('');
            const more = res.length>60 ? `<div class="text-raveGreen/30 font-mono text-[11px] px-3 py-2 text-center">+${res.length-60} resultados más — afiná la búsqueda</div>` : '';
            box.innerHTML += more;
        }
        function gotoById(id){
            const item = archiveDatabase.find(it => String(it.id)===String(id));
            if (!item) return;
            closeSearch();
            currentSalaGlobal=item.sala; currentSubsalaGlobal=item.subsala||null;
            const full=salaFull[item.sala]||item.sala;
            const labelSub = currentSubsalaGlobal ? ` (${currentSubsalaGlobal.split('—')[0].trim()})` : '';
            document.getElementById('active-sala-label').textContent = item.sala + labelSub;
            document.getElementById('subsala-breadcrumb').textContent = currentSubsalaGlobal ? `${full} › ${currentSubsalaGlobal}` : full;
            itemsFiltrados = archiveDatabase.filter(it => it.sala===item.sala && it.subsala===currentSubsalaGlobal);
            indexActivo = Math.max(0, itemsFiltrados.findIndex(it => String(it.id)===String(id)));
            highlightNav(); renderItem();
            document.querySelector('main .overflow-y-auto').scrollTop = 0;
        }

        // ---------- HASH ROUTING ----------
        function hashFor(item){ return (typeof item.id==='number') ? `e-${item.id}` : `${item.id}`; }
        function updateHash(){
            const item = itemsFiltrados[indexActivo];
            if (item && item.id!==undefined){ history.replaceState(null,'',`#${hashFor(item)}`); }
        }
        function gotoFromHash(){
            const h = (location.hash||'').replace('#','');
            if (!h) return false;
            const id = h.startsWith('e-') ? h.slice(2) : h;
            const item = archiveDatabase.find(it => String(it.id)===String(id));
            if (item){ gotoById(item.id); return true; }
            return false;
        }

        function closeSidebar(){
