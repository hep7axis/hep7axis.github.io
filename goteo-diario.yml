# HEP7AXIS // MODO GOTEO
# Reconstruye y publica el sitio una vez al día (y en cada push).
# Permite dejar heptálogos con fecha futura y que se publiquen solos.
# Activación: ver COMO_PUBLICAR.md (sección Modo Goteo).
name: goteo-diario

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC ≈ 08:00 Chile
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build con Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
