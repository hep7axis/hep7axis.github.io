<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HEP7AXIS // BETA_BLOG</title>

    <!-- Favicon: la estrella de 7 puntas siempre presente, incluso en la pestaña -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200' fill='none' stroke='%2300FF41' stroke-width='12' stroke-linejoin='miter' stroke-miterlimit='10'%3E%3Cpath d='M100,190 L139.05,18.91 L29.64,156.11 L187.74,79.97 L12.26,79.97 L170.36,156.11 L60.95,18.91 Z'/%3E%3C/svg%3E">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root{
            --bg:#000000;
            --green:#00FF41;
            --green-dim:rgba(0,255,65,.55);
            --line-dim:rgba(0,255,65,.30);
            --white:#FFFFFF;
        }

        *{ box-sizing:border-box; margin:0; padding:0; }

        body{
            background-color:var(--bg);
            color:var(--white);
            font-family:'Roboto',sans-serif;
            font-size:clamp(0.85rem, 0.4vw + 0.8rem, 1.1rem);
            line-height:1.6;
            padding:clamp(15px, 4vw, 40px);
        }

        /* ---------- CABECERA ---------- */
        header{
            text-align:center;
            border-bottom:1px solid var(--green);
            padding-bottom:clamp(30px, 6vw, 60px);
            margin-bottom:clamp(30px, 6vw, 60px);
        }
        .logo-wrapper{ margin-bottom:20px; }
        .logo-wrapper svg{ width:clamp(100px, 15vw, 180px); height:auto; }

        h1{
            font-size:clamp(2.2rem, 6vw, 4.5rem);
            font-weight:900;
            letter-spacing:0.3em;
            text-transform:uppercase;
            color:var(--white);
            margin-bottom:15px;
            line-height:1.1;
            /* compensa el tracking para que no se descentre a la derecha */
            text-indent:0.3em;
        }
        .terminal-prompt{
            color:var(--green);
            font-size:clamp(0.75rem, 1.5vw, 1rem);
            font-weight:400;
            letter-spacing:0.15em;
            text-transform:uppercase;
        }
        .cursor{
            display:inline-block;
            width:0.6em; height:1.05em;
            background:var(--green);
            vertical-align:-0.15em;
            margin-left:6px;
            animation:blink 1.1s step-end infinite;
        }
        @keyframes blink{ 50%{ opacity:0; } }

        main{ max-width:1300px; margin:0 auto; }

        h2.section-title{
            color:var(--green);
            font-size:clamp(1.4rem, 3vw, 2.2rem);
            font-weight:700;
            letter-spacing:0.25em;
            text-transform:uppercase;
            margin-bottom:40px;
            border-left:5px solid var(--green);
            padding-left:15px;
        }

        /* ---------- REJILLA DE HEPTÁLOGOS ---------- */
        .grid-heptalogos{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(310px, 1fr));
            gap:30px;
        }

        .heptalogo-card{
            border:1px solid var(--green);
            padding:25px;
            background-color:var(--bg);
            display:flex;
            flex-direction:column;
        }

        /* fila superior: número a la izquierda, sello (logo) a la derecha — siempre */
        .card-top{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            gap:12px;
        }
        .card-top .num{
            color:var(--green);
            font-weight:700;
            font-size:0.85rem;
            letter-spacing:0.15em;
            text-transform:uppercase;
        }
        .card-seal{ width:30px; height:30px; flex:0 0 auto; }

        .card-date{
            color:var(--green-dim);
            font-size:0.85rem;
            letter-spacing:0.15em;
            text-transform:uppercase;
            margin:4px 0 20px;
        }

        .card-cover{
            border:1px solid var(--line-dim);
            min-height:200px;
            margin-bottom:25px;
            display:grid;
            place-items:center;
            text-align:center;
            background-color:var(--bg);
            padding:10px;
            position:relative;
            overflow:hidden;
        }
        .card-cover img{
            width:100%; height:100%;
            object-fit:cover;
            display:block;
        }
        /* heptagrama de fondo en portadas sin imagen: el logo siempre acompaña */
        .cover-watermark{
            position:absolute;
            width:62%; height:auto;
            opacity:0.12;
            top:50%; left:50%;
            transform:translate(-50%, -50%);
            pointer-events:none;
        }
        .ascii-placeholder{
            position:relative;
            z-index:1;
            color:var(--green-dim);
            font-size:0.75rem;
            letter-spacing:0.2em;
            text-transform:uppercase;
            font-weight:300;
        }

        h3.card-title{
            font-size:clamp(1.1rem, 2vw, 1.4rem);
            font-weight:900;
            letter-spacing:0.1em;
            text-transform:uppercase;
            color:var(--white);
            margin-bottom:25px;
            line-height:1.3;
        }

        ol.heptalogo-list{
            list-style:none;
            margin-bottom:30px;
            /* empuja el botón al fondo aunque las tarjetas tengan distinto largo */
            flex:1 1 auto;
        }
        ol.heptalogo-list li{
            font-size:0.9rem;
            color:var(--white);
            margin-bottom:12px;
            padding-bottom:8px;
            border-bottom:1px dashed var(--line-dim);
            text-align:left;
        }
        ol.heptalogo-list li:last-child{
            border-bottom:0;
            margin-bottom:0;
            padding-bottom:0;
        }
        ol.heptalogo-list li .item-index{
            color:var(--green);
            font-weight:700;
            margin-right:8px;
        }

        .read-btn{
            display:block;
            width:100%;
            padding:15px;
            border:1px solid var(--green);
            background:transparent;
            color:var(--green);
            text-align:center;
            text-decoration:none;
            font-weight:700;
            letter-spacing:0.2em;
            text-transform:uppercase;
            font-size:0.85rem;
            transition:background-color .15s, color .15s;
        }
        .read-btn:hover{ background-color:var(--green); color:var(--bg); }

        .noscript-msg{
            border:1px solid var(--green);
            padding:20px;
            color:var(--green);
            font-size:0.85rem;
            letter-spacing:0.1em;
            text-transform:uppercase;
        }

        /* ---------- PIE ---------- */
        footer{
            max-width:1300px;
            margin:clamp(50px, 8vw, 100px) auto 0 auto;
            border-top:1px solid var(--green);
            padding-top:30px;
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
            gap:20px;
            font-size:0.85rem;
            letter-spacing:0.15em;
            text-transform:uppercase;
        }
        .footer-networks a{
            color:var(--green);
            text-decoration:none;
            margin-right:25px;
            font-weight:500;
        }
        .footer-networks a:hover{ text-decoration:underline; }
        .footer-frequency{ color:var(--green-dim); text-align:right; }

        @media (max-width:600px){
            .footer-frequency{ text-align:left; margin-top:5px; }
        }

        a:focus-visible, .read-btn:focus-visible{
            outline:2px solid var(--green);
            outline-offset:3px;
        }
        @media (prefers-reduced-motion:reduce){
            .cursor{ animation:none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-wrapper">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Heptagrama Hep7axis" fill="none" stroke="#00FF41" stroke-width="2.5" stroke-linejoin="miter" stroke-miterlimit="10">
                <path d="M100,190 L139.05,18.91 L29.64,156.11 L187.74,79.97 L12.26,79.97 L170.36,156.11 L60.95,18.91 Z"/>
            </svg>
        </div>
        <h1>HEP7AXIS</h1>
        <div class="terminal-prompt">&gt; BETA_PHASE_01 // DISIDENCIA_DIGITAL // NO_INDEX // NO_TRACKING<span class="cursor" aria-hidden="true"></span></div>
    </header>

    <main>
        <h2 class="section-title">HEPTÁLOGOS</h2>
        <div id="heptalogos" class="grid-heptalogos"></div>
        <noscript>
            <div class="noscript-msg">&gt; JavaScript deshabilitado // los heptálogos se montan con un script local. Habilítalo para leer el contenido.</div>
        </noscript>
    </main>

    <footer>
        <div class="footer-networks">
            <a href="https://instagram.com/hep7axis" target="_blank" rel="noopener noreferrer">IG // @HEP7AXIS</a>
            <a href="https://mastodon.social/@hep7axis" target="_blank" rel="noopener noreferrer">MASTODON // @HEP7AXIS</a>
        </div>
        <div class="footer-frequency">[ PUBLICACIÓN MENSUAL ]</div>
    </footer>

    <script>
    "use strict";

    /* =======================================================================
       LÓGICA DE HEPTÁLOGOS
       Cada heptálogo es UN objeto. Para publicar el siguiente, copia el bloque
       y cambia los datos. Reglas:
         - "items" debe tener EXACTAMENTE 7 elementos (la consola avisa si no).
         - La numeración 01/…07/ se genera sola: no la escribas a mano.
         - Lo más nuevo arriba (el primer objeto del arreglo se muestra primero).
         - "cover" opcional: si pones una URL de imagen, se usa como portada;
           si la dejas vacía, va el heptagrama de marca como portada provisional.
       ======================================================================= */
    const HEPTALOGOS = [
        {
            num: "00",
            date: "11.06.2026",
            title: "Manifiesto contra el algoritmo panóptico",
            cover: "",                 // ej: "img/portada-00.png"
            coverLabel: "PORTADA_STARK",
            link: "https://instagram.com/hep7axis",
            cta: "LEER EN INSTAGRAM",
            items: [
                "La red comercial ha muerto; sólo queda infraestructura de vigilancia masiva.",
                "Rechazamos la indexación obligatoria y la tiranía del posicionamiento SEO.",
                "No buscamos tu 'like'; operamos bajo la lógica del intercambio subalterno.",
                "El anonimato no es un crimen, es la última línea de defensa cognitiva.",
                "Volver al nodo aislado: comunidades cifradas, descentralizadas y autónomas.",
                "La estética BBS es resistencia contra el diseño limpio corporativo.",
                "Destruye tus cookies. Desconfigura tu identidad digital. Hackea tu atención."
            ]
        }
        // ,{ num:"01", date:"DD.MM.AAAA", title:"...", cover:"", coverLabel:"PORTADA",
        //    link:"https://instagram.com/hep7axis", cta:"LEER EN INSTAGRAM",
        //    items:["1","2","3","4","5","6","7"] }
    ];

    /* ---------- núcleo ---------- */
    const HEPTAGRAM_PATH = "M100,190 L139.05,18.91 L29.64,156.11 L187.74,79.97 L12.26,79.97 L170.36,156.11 L60.95,18.91 Z";

    function esc(s){
        return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
            { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]
        ));
    }

    function heptagram(cls, strokeWidth){
        return '<svg class="' + cls + '" viewBox="0 0 200 200" role="img" aria-label="Heptagrama Hep7axis" '
             + 'fill="none" stroke="#00FF41" stroke-width="' + strokeWidth + '" '
             + 'stroke-linejoin="miter" stroke-miterlimit="10"><path d="' + HEPTAGRAM_PATH + '"/></svg>';
    }

    function renderCover(h){
        if (h.cover){
            return '<div class="card-cover"><img src="' + esc(h.cover) + '" alt="Portada del heptálogo ' + esc(h.num) + '"></div>';
        }
        const label = '[ H7_IMG_' + esc(h.num) + ' // ' + esc(h.coverLabel || "PORTADA") + ' ]';
        return '<div class="card-cover">' + heptagram("cover-watermark", 6)
             + '<div class="ascii-placeholder">' + label + '</div></div>';
    }

    function renderItems(items){
        return items.map((t, i) =>
            '<li><span class="item-index">' + String(i + 1).padStart(2, "0") + '/</span>' + esc(t) + '</li>'
        ).join("");
    }

    function renderCard(h){
        return '<article class="heptalogo-card">'
             +   '<div class="card-top"><span class="num">N&ordm; ' + esc(h.num) + '</span>' + heptagram("card-seal", 8) + '</div>'
             +   '<div class="card-date">' + esc(h.date) + '</div>'
             +   renderCover(h)
             +   '<h3 class="card-title">' + esc(h.title) + '</h3>'
             +   '<ol class="heptalogo-list">' + renderItems(h.items) + '</ol>'
             +   '<a class="read-btn" href="' + esc(h.link || "#") + '" target="_blank" rel="noopener noreferrer">&gt; ' + esc(h.cta || "LEER EN INSTAGRAM") + '</a>'
             + '</article>';
    }

    function render(){
        // valida la lógica: 7 elementos por heptálogo
        HEPTALOGOS.forEach(h => {
            const n = Array.isArray(h.items) ? h.items.length : 0;
            if (n !== 7){
                console.warn('[hep7axis] Heptálogo Nº ' + h.num + ': ' + n + ' elementos — la lógica exige exactamente 7.');
            }
        });
        document.getElementById("heptalogos").innerHTML = HEPTALOGOS.map(renderCard).join("");
    }

    render();
    </script>

</body>
</html>
